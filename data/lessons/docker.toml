[[gotchas]]
title = "容器停止后数据默认丢失"
content = """Docker 容器的文件系统是临时的：容器删除后，内部的数据也随之消失。持久化数据应使用 Volume（卷）：docker run -v /host/path:/container/path ...或使用具名卷：docker run -v mydata:/data ...数据库、上传文件、配置文件等都应该挂载卷，否则重启后数据会丢失。"""

[[gotchas]]
title = "docker run 每次都创建新容器"
content = """每次执行 docker run 都会创建一个全新的容器实例，而非重启已有容器。如果要重启已停止的容器，应使用 docker start 容器名/ID。用 docker run --rm 可以让容器在退出后自动删除，适合一次性任务。长期运行的服务容器建议使用 docker compose 管理，更易于维护。"""
