[meta]
command = "docker"
full_name = "Docker Container Platform"
category = "scripting"
difficulty = "basic"
importance = "core"

[overview]
summary = "容器化平台，用于构建、运行和管理应用容器"
explanation = """Docker 是最流行的容器化平台，让应用及其所有依赖被打包成一个可移植的镜像。容器与虚拟机不同：容器共享宿主机内核，启动更快、资源占用更少。核心概念：镜像（image）是模板，容器（container）是运行中的镜像实例。Dockerfile 定义如何构建镜像；Docker Compose 管理多容器应用。Docker 是现代 DevOps 和微服务架构的基础，掌握 Docker 命令是当代后端开发者和运维工程师的必备技能。"""

[syntax]
basic = "docker <子命令> [选项] [参数]"
[[syntax.parts]]
name = "子命令"
desc = "操作类型：run、ps、build、exec、images、logs、compose 等"
[[syntax.parts]]
name = "参数"
desc = "容器名/ID、镜像名、文件路径等，根据子命令而定"

[[options]]
flag = "ps"
name = "列出容器"
example = "docker ps -a"
note = "列出运行中的容器；-a 显示所有容器（含已停止的）"

[[options]]
flag = "run"
name = "创建并运行容器"
example = "docker run -d -p 8080:80 nginx"
note = "-d 后台运行，-p 端口映射（宿主机:容器）"

[[options]]
flag = "build"
name = "构建镜像"
example = "docker build -t myapp:v1 ."
note = "-t 指定镜像名和标签，. 表示 Dockerfile 在当前目录"

[[options]]
flag = "exec"
name = "在容器中执行命令"
example = "docker exec -it mycontainer bash"
note = "-i 交互，-t 分配终端，bash 进入容器 shell"

[[options]]
flag = "images"
name = "列出本地镜像"
example = "docker images"
note = "显示本地存储的所有镜像及其大小"

[[options]]
flag = "logs"
name = "查看容器日志"
example = "docker logs -f mycontainer"
note = "-f 实时跟踪日志输出（类似 tail -f）"

[[examples]]
level = 1
command = "docker ps"
summary = "列出所有正在运行的容器"
simulated_output = """CONTAINER ID   IMAGE          COMMAND                  CREATED       STATUS       PORTS                  NAMES
a1b2c3d4e5f6   nginx:latest   "/docker-entrypoint.…"   2 hours ago   Up 2 hours   0.0.0.0:80->80/tcp     webserver
b7c8d9e0f1a2   postgres:15    "docker-entrypoint.s…"   3 hours ago   Up 3 hours   5432/tcp               mydb"""

output_explanation = "输出显示了 Docker 容器/镜像/构建或日志相关信息。重点关注容器状态（Up/Exited）、镜像标签、端口映射及错误日志。"
[[examples.token_details]]
token = "ps"
explanation = "命令参数，用于指定要处理的对象或行为细节。"

