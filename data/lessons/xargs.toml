[meta]
command = "xargs"
full_name = "extended arguments"
category = "pipeline"
difficulty = "advanced"
importance = "common"

[overview]
summary = "从标准输入构建并执行命令"
explanation = """xargs 从标准输入读取数据，将其转换为指定命令的参数并执行。\
它是管道操作中的重要桥梁，解决了很多命令不能直接从 stdin 读取参数的问题。\
例如 rm 不接受管道输入文件名，但通过 xargs 可以实现：\
find . -name '*.tmp' | xargs rm。\
xargs 会将输入按空白字符分割成参数，默认传递给 echo 命令。\
在处理大量文件时，xargs 比 find -exec 更高效，\
因为它会将多个参数合并成一次命令调用，减少进程创建开销。"""

[syntax]
basic = "... | xargs [选项] [命令]"
[[syntax.parts]]
name = "命令"
desc = "要执行的命令，默认为 echo"

[[options]]
flag = "-I"
name = "替换字符串"
example = "ls *.txt | xargs -I {} cp {} /backup/"
note = "将 {} 替换为每一行输入，每次执行一行"

[[options]]
flag = "-n"
name = "每次传递参数数量"
example = "echo 1 2 3 4 | xargs -n 2 echo"
note = "每次向命令传递 N 个参数"

[[options]]
flag = "-d"
name = "指定分隔符"
example = "echo 'a:b:c' | xargs -d: echo"
note = "使用指定字符作为输入分隔符（默认为空白）"

[[options]]
flag = "-0"
name = "空字符分隔"
example = "find . -name '*.txt' -print0 | xargs -0 rm"
note = "使用 NULL 字符作为分隔符，处理文件名中有空格的情况"

[[options]]
flag = "-p"
name = "交互确认"
example = "find . -name '*.bak' | xargs -p rm"
note = "执行每条命令前询问确认"

[[options]]
flag = "-t"
name = "显示命令"
example = "ls *.log | xargs -t rm"
note = "执行前先打印将要执行的命令"

