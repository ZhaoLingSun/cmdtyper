[[gotchas]]
title = "文件名包含空格或特殊字符"
content = """xargs 默认用空白字符分割输入，如果文件名包含空格会导致问题：
  文件 "my file.txt" 会被 xargs 解析为 "my" 和 "file.txt" 两个参数

解决方案是使用 NULL 字符分隔：
  find . -name '*.txt' -print0 | xargs -0 rm
  -print0 使 find 用 NULL 字符分隔结果
  -0 使 xargs 用 NULL 字符分割输入

这是处理任意文件名时的最佳实践，应该养成习惯使用。"""

[[gotchas]]
title = "xargs 与 find -exec 的对比"
content = """xargs 和 find -exec 都可以对搜索结果执行命令，各有优劣：
  find -exec cmd {} \\;   — 每个文件执行一次命令（慢）
  find -exec cmd {} +    — 批量传参（快，推荐）
  find | xargs cmd       — 管道传参（快，但空格问题）
  find -print0 | xargs -0 cmd — 管道传参（快且安全）

xargs 的独特优势：
  - 可以与任何产生文件列表的命令配合（不限于 find）
  - -P 选项支持并行执行
  - -I 支持灵活的参数位置替换"""
