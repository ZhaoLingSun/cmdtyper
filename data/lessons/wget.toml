[[gotchas]]
title = "wget 与 curl 的选择"
content = """wget 和 curl 都能下载文件，但侧重点不同：
  wget 擅长：
    - 下载文件（默认保存到本地文件）
    - 断点续传（-c）
    - 递归下载和网站镜像
    - 后台下载（-b）

  curl 擅长：
    - API 交互（支持更多协议和 HTTP 方法）
    - 发送 POST/PUT 请求和 JSON 数据
    - 自定义 HTTP 头部
    - 默认输出到终端（适合管道）

简单记忆：下载文件用 wget，调接口用 curl。"""
