[meta]
command = "wget"
full_name = "World Wide Web Get"
category = "network"
difficulty = "basic"
importance = "common"

[overview]
summary = "从网络下载文件"
explanation = """wget 是 Linux 中最常用的命令行下载工具，支持 HTTP、HTTPS 和 FTP 协议。\
它的特点是稳定可靠，支持断点续传、递归下载、后台下载等功能。\
即使网络不稳定或下载中断，wget 也能从断点处继续下载。\
wget 的使用非常简单，最基本的用法只需 wget URL 即可开始下载。\
在服务器环境中没有图形界面时，wget 是下载文件的首选工具。\
与 curl 相比，wget 更擅长下载文件，curl 更擅长 API 交互。"""

[syntax]
basic = "wget [选项] URL..."
[[syntax.parts]]
name = "URL"
desc = "要下载的文件地址，支持 HTTP/HTTPS/FTP"

[[options]]
flag = "-O"
name = "指定输出文件名"
example = "wget -O latest.tar.gz https://example.com/file.tar.gz"
note = "将下载内容保存为指定的文件名（大写 O）"

[[options]]
flag = "-c"
name = "断点续传"
example = "wget -c https://example.com/large-file.iso"
note = "从上次中断的位置继续下载"

[[options]]
flag = "-q"
name = "静默模式"
example = "wget -q https://example.com/file.txt"
note = "不显示下载进度信息"

[[options]]
flag = "-b"
name = "后台下载"
example = "wget -b https://example.com/large-file.iso"
note = "在后台下载，进度写入 wget-log 文件"

[[options]]
flag = "-r"
name = "递归下载"
example = "wget -r -l 2 https://example.com/"
note = "递归下载网站页面，-l 指定递归深度"

[[options]]
flag = "--limit-rate"
name = "限速下载"
example = "wget --limit-rate=1m https://example.com/file.iso"
note = "限制下载速度，支持 k（KB/s）和 m（MB/s）"

[[examples]]
level = 1
command = "wget https://example.com/file.tar.gz"
summary = "下载文件到当前目录"
