[meta]
command = "git"
full_name = "Git Version Control"
category = "scripting"
difficulty = "basic"
importance = "core"

[overview]
summary = "分布式版本控制系统，用于跟踪代码变更和团队协作"
explanation = """git 是当今最流行的分布式版本控制系统，由 Linux 内核创始人 Linus Torvalds 于 2005 年创建。版本控制让你可以记录文件的变更历史，随时回退到之前的状态，并与他人协作开发。git 的核心概念：仓库（repository）、提交（commit）、分支（branch）、合并（merge）。典型工作流：git add 暂存修改 → git commit 提交记录 → git push 推送到远程仓库。git 几乎是所有软件开发项目的基础工具，掌握它是现代开发者的必备技能。"""

[syntax]
basic = "git <子命令> [选项] [参数]"
[[syntax.parts]]
name = "子命令"
desc = "具体操作：add、commit、push、pull、branch、merge、log、diff 等"
[[syntax.parts]]
name = "参数"
desc = "根据子命令不同，可以是文件路径、分支名、提交 ID 等"

[[options]]
flag = "add"
name = "暂存修改"
example = "git add ."
note = "将工作区的修改添加到暂存区（staging area）"

[[options]]
flag = "commit"
name = "提交记录"
example = "git commit -m '修复登录bug'"
note = "将暂存区的修改提交到本地仓库，-m 指定提交信息"

[[options]]
flag = "push"
name = "推送到远程"
example = "git push origin main"
note = "将本地提交推送到远程仓库"

[[options]]
flag = "pull"
name = "拉取并合并"
example = "git pull origin main"
note = "从远程仓库拉取最新修改并合并到当前分支"

[[options]]
flag = "branch"
name = "管理分支"
example = "git branch feature/login"
note = "列出、创建或删除分支"

[[options]]
flag = "merge"
name = "合并分支"
example = "git merge feature/login"
note = "将指定分支的修改合并到当前分支"

[[options]]
flag = "log"
name = "查看提交历史"
example = "git log --oneline"
note = "显示提交历史记录，--oneline 以简洁一行格式显示"

[[options]]
flag = "diff"
name = "查看差异"
example = "git diff HEAD~1"
note = "显示工作区与暂存区，或两次提交之间的差异"

[[options]]
flag = "stash"
name = "临时储藏"
example = "git stash"
note = "临时保存未提交的修改，以便切换分支"

[[examples]]
level = 1
command = "git status"
summary = "查看当前仓库的工作区和暂存区状态"
simulated_output = """On branch main
Your branch is up to date with 'origin/main'.

Changes not staged for commit:
  (use "git add <file>..." to update what will be committed)
        modified:   src/main.rs

Untracked files:
  (use "git add <file>..." to include in what will be committed)
        notes.txt"""

output_explanation = "输出体现了 Git 仓库当前状态或历史操作结果。可根据分支名、提交哈希、变更文件列表判断是否处于预期的开发流程。"
[[examples.token_details]]
token = "status"
explanation = "命令参数，用于指定要处理的对象或行为细节。"

[[examples]]
level = 1
command = "git log --oneline -5"
summary = "查看最近5条提交历史（简洁格式）"
simulated_output = """a3f8c12 修复用户登录验证失败的问题
b1d7e89 添加密码重置功能
c4a2f01 优化数据库查询性能
d8e3b56 更新依赖库版本
e5f9c23 初始化项目结构"""

