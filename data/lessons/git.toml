[[gotchas]]
title = "git add . 会暂存所有修改包括不需要的文件"
content = """git add . 会暂存当前目录（含子目录）中所有修改过的文件。在提交前务必用 git status 确认暂存了正确的文件。应该使用 .gitignore 文件排除不需要跟踪的文件，如 node_modules/、target/、*.pyc、.env 等。"""

[[gotchas]]
title = "push 前先 pull，避免冲突"
content = """在团队协作中，push 前应先 pull 获取最新改动，再推送自己的提交。如果直接 push 遇到 "rejected" 错误，说明远程有新提交需要先合并。可以用 git pull --rebase 代替 git pull，历史记录更加整洁。强制推送（git push -f）会覆盖他人的提交，在共享分支上应避免使用！"""
