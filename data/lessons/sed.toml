[[gotchas]]
title = "sed -i 的平台差异"
content = """sed -i 在 GNU/Linux 和 macOS/BSD 上的行为不同：
  Linux (GNU sed)：  sed -i 's/old/new/' file     ✓
  macOS (BSD sed)：  sed -i '' 's/old/new/' file   ← 需要空字符串参数

跨平台脚本建议使用备份后缀：
  sed -i.bak 's/old/new/' file
  这在两个平台上都能正常工作，只是会多生成一个 .bak 备份文件。

警告：sed -i 直接修改文件，操作前建议先不加 -i 预览结果：
  sed 's/old/new/g' file    — 先看看效果
  sed -i 's/old/new/g' file — 确认无误后再原地修改"""

[[gotchas]]
title = "s 命令不加 g 只替换第一个匹配"
content = """sed 的替换命令默认只替换每行中的第一个匹配：
  echo "aaa" | sed 's/a/b/'     → baa（只替换了第一个 a）
  echo "aaa" | sed 's/a/b/g'    → bbb（替换了所有 a）

其他有用的替换标志：
  s/old/new/2     — 只替换第 2 个匹配
  s/old/new/gi    — 全局替换且忽略大小写（GNU 扩展）
  s/old/new/p     — 替换后打印该行（配合 -n 使用）
  s/old/new/w out — 替换后将修改过的行写入文件 out"""
