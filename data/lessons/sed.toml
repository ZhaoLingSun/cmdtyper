[meta]
command = "sed"
full_name = "stream editor"
category = "text_process"
difficulty = "advanced"
importance = "core"

[overview]
summary = "流式文本编辑器，用于文本替换和处理"
explanation = """sed（stream editor）是 Linux 中的流式文本编辑器，\
它从输入（文件或管道）逐行读取文本，按照指定的编辑命令进行处理，\
然后将结果输出。sed 最常用的功能是文本替换（s///），\
但它还能执行删除行、插入行、打印行等多种操作。\
sed 的强大之处在于它可以用一条命令对整个文件进行批量文本替换，\
配合 -i 选项可以直接修改文件内容（原地编辑），\
这在批量修改配置文件、处理日志数据等场景中极其实用。\
sed 支持基本正则表达式和扩展正则表达式（-E 选项）。"""

[syntax]
basic = "sed [选项] '命令' [文件]"
[[syntax.parts]]
name = "命令"
desc = "编辑命令，如 s/旧文本/新文本/g（替换）、d（删除）等"
[[syntax.parts]]
name = "文件"
desc = "要处理的文件，省略时从标准输入读取"

[[options]]
flag = "-i"
name = "原地编辑"
example = "sed -i 's/old/new/g' file.txt"
note = "直接修改文件内容，不输出到终端。加后缀可备份：-i.bak"

[[options]]
flag = "-n"
name = "静默模式"
example = "sed -n '5,10p' file.txt"
note = "不自动输出，配合 p 命令只打印匹配的行"

[[options]]
flag = "-e"
name = "多条命令"
example = "sed -e 's/a/A/' -e 's/b/B/' file.txt"
note = "执行多个编辑命令"

[[options]]
flag = "-E"
name = "扩展正则表达式"
example = "sed -E 's/[0-9]+/NUM/g' file.txt"
note = "使用扩展正则表达式（支持 +、?、| 等不需要转义）"

[[options]]
flag = "s///g"
name = "全局替换"
example = "sed 's/foo/bar/g' file.txt"
note = "替换命令。不加 g 只替换每行第一个匹配"

[[options]]
flag = "d"
name = "删除行"
example = "sed '/^#/d' config.txt"
note = "删除匹配的行"

[[examples]]
level = 1
command = "sed 's/error/ERROR/g' app.log"
summary = "将日志中所有 error 替换为 ERROR"
simulated_output = """[2026-03-09 14:30:12] INFO: Server started
[2026-03-09 14:30:15] ERROR: Connection refused
[2026-03-09 14:30:18] WARN: Retry attempt 1
[2026-03-09 14:30:20] ERROR: Timeout exceeded"""

output_explanation = "这是 sed 文本替换/筛选后的结果。未加 `-i` 时只输出到终端，不改原文件；加 `-i` 时会直接改文件。"
[[examples.token_details]]
token = "s/error/ERROR/g"
explanation = "这是文本处理表达式，用来定义匹配规则和输出/替换动作。"

[[examples.token_details]]
token = "app.log"
explanation = "输入或输出文件名，命令会对这个文件进行读取/写入/处理。"

[[examples]]
level = 2
command = "sed -n '10,20p' config.yml"
summary = "只打印文件的第 10 到第 20 行"
simulated_output = """database:
  host: localhost
  port: 5432
  name: myapp_production
  pool: 25
  timeout: 5000

redis:
  host: 127.0.0.1
  port: 6379
  db: 0"""

output_explanation = "这是 sed 文本替换/筛选后的结果。未加 `-i` 时只输出到终端，不改原文件；加 `-i` 时会直接改文件。"
[[examples.token_details]]
token = "-n"
explanation = "静默模式：关闭默认逐行输出，常与 p 等命令配合按需打印。"

[[examples.token_details]]
token = "10,20p"
explanation = "地址范围 + 打印命令：选择第 10 到 20 行并输出。"

[[examples.token_details]]
token = "config.yml"
explanation = "输入或输出文件名，命令会对这个文件进行读取/写入/处理。"

[[examples]]
level = 2
command = "sed '/^#/d; /^$/d' /etc/ssh/sshd_config"
summary = "删除配置文件中的注释行和空行"
display = "sed '/^#/d; /^$/d' \\\n  /etc/ssh/sshd_config"
simulated_output = """Include /etc/ssh/sshd_config.d/*.conf
Port 22
AddressFamily any
ListenAddress 0.0.0.0
PermitRootLogin prohibit-password
PubkeyAuthentication yes
PasswordAuthentication no
UsePAM yes
X11Forwarding yes
