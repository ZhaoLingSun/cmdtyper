[meta]
command = "sed"
full_name = "stream editor"
category = "text_process"
difficulty = "advanced"
importance = "core"

[overview]
summary = "流式文本编辑器，用于文本替换和处理"
explanation = """sed（stream editor）是 Linux 中的流式文本编辑器，\
它从输入（文件或管道）逐行读取文本，按照指定的编辑命令进行处理，\
然后将结果输出。sed 最常用的功能是文本替换（s///），\
但它还能执行删除行、插入行、打印行等多种操作。\
sed 的强大之处在于它可以用一条命令对整个文件进行批量文本替换，\
配合 -i 选项可以直接修改文件内容（原地编辑），\
这在批量修改配置文件、处理日志数据等场景中极其实用。\
sed 支持基本正则表达式和扩展正则表达式（-E 选项）。"""

[syntax]
basic = "sed [选项] '命令' [文件]"
[[syntax.parts]]
name = "命令"
desc = "编辑命令，如 s/旧文本/新文本/g（替换）、d（删除）等"
[[syntax.parts]]
name = "文件"
desc = "要处理的文件，省略时从标准输入读取"

[[options]]
flag = "-i"
name = "原地编辑"
example = "sed -i 's/old/new/g' file.txt"
note = "直接修改文件内容，不输出到终端。加后缀可备份：-i.bak"

[[options]]
flag = "-n"
name = "静默模式"
example = "sed -n '5,10p' file.txt"
note = "不自动输出，配合 p 命令只打印匹配的行"

[[options]]
flag = "-e"
name = "多条命令"
example = "sed -e 's/a/A/' -e 's/b/B/' file.txt"
note = "执行多个编辑命令"

[[options]]
flag = "-E"
name = "扩展正则表达式"
example = "sed -E 's/[0-9]+/NUM/g' file.txt"
note = "使用扩展正则表达式（支持 +、?、| 等不需要转义）"

[[options]]
flag = "s///g"
name = "全局替换"
example = "sed 's/foo/bar/g' file.txt"
note = "替换命令。不加 g 只替换每行第一个匹配"

[[options]]
flag = "d"
name = "删除行"
example = "sed '/^#/d' config.txt"
note = "删除匹配的行"

[[examples]]
level = 1
command = "sed 's/error/ERROR/g' app.log"
summary = "将日志中所有 error 替换为 ERROR"
simulated_output = """[2026-03-09 14:30:12] INFO: Server started
[2026-03-09 14:30:15] ERROR: Connection refused
[2026-03-09 14:30:18] WARN: Retry attempt 1
[2026-03-09 14:30:20] ERROR: Timeout exceeded"""

[[examples]]
level = 2
command = "sed -n '10,20p' config.yml"
summary = "只打印文件的第 10 到第 20 行"
simulated_output = """database:
  host: localhost
  port: 5432
  name: myapp_production
  pool: 25
  timeout: 5000

redis:
  host: 127.0.0.1
  port: 6379
  db: 0"""

[[examples]]
level = 2
command = "sed '/^#/d; /^$/d' /etc/ssh/sshd_config"
summary = "删除配置文件中的注释行和空行"
display = "sed '/^#/d; /^$/d' \\\n  /etc/ssh/sshd_config"
simulated_output = """Include /etc/ssh/sshd_config.d/*.conf
Port 22
AddressFamily any
ListenAddress 0.0.0.0
PermitRootLogin prohibit-password
PubkeyAuthentication yes
PasswordAuthentication no
UsePAM yes
X11Forwarding yes
Subsystem sftp /usr/lib/openssh/sftp-server"""

[[examples]]
level = 3
command = "sed -i 's/PasswordAuthentication yes/PasswordAuthentication no/' /etc/ssh/sshd_config"
summary = "直接修改 SSH 配置禁用密码登录"
display = "sed -i \\\n  's/PasswordAuthentication yes/PasswordAuthentication no/' \\\n  /etc/ssh/sshd_config"
simulated_output = ""

[[examples]]
level = 3
command = "sed -i.bak 's/localhost/db.production.internal/g' config.yml"
summary = "替换数据库地址并自动备份原文件"
display = "sed -i.bak \\\n  's/localhost/db.production.internal/g' \\\n  config.yml"
simulated_output = ""

[[examples]]
level = 4
command = "sed -E 's/([0-9]{4})-([0-9]{2})-([0-9]{2})/\\3\\/\\2\\/\\1/g' dates.txt"
summary = "将日期格式从 YYYY-MM-DD 转换为 DD/MM/YYYY"
display = "sed -E \\\n  's/([0-9]{4})-([0-9]{2})-([0-9]{2})/\\3\\/\\2\\/\\1/g' \\\n  dates.txt"
simulated_output = """09/03/2026 Meeting with team
15/03/2026 Project deadline
22/03/2026 Release v2.0"""

[[gotchas]]
title = "sed -i 的平台差异"
content = """sed -i 在 GNU/Linux 和 macOS/BSD 上的行为不同：
  Linux (GNU sed)：  sed -i 's/old/new/' file     ✓
  macOS (BSD sed)：  sed -i '' 's/old/new/' file   ← 需要空字符串参数

跨平台脚本建议使用备份后缀：
  sed -i.bak 's/old/new/' file
  这在两个平台上都能正常工作，只是会多生成一个 .bak 备份文件。

警告：sed -i 直接修改文件，操作前建议先不加 -i 预览结果：
  sed 's/old/new/g' file    — 先看看效果
  sed -i 's/old/new/g' file — 确认无误后再原地修改"""

[[gotchas]]
title = "s 命令不加 g 只替换第一个匹配"
content = """sed 的替换命令默认只替换每行中的第一个匹配：
  echo "aaa" | sed 's/a/b/'     → baa（只替换了第一个 a）
  echo "aaa" | sed 's/a/b/g'    → bbb（替换了所有 a）

其他有用的替换标志：
  s/old/new/2     — 只替换第 2 个匹配
  s/old/new/gi    — 全局替换且忽略大小写（GNU 扩展）
  s/old/new/p     — 替换后打印该行（配合 -n 使用）
  s/old/new/w out — 替换后将修改过的行写入文件 out"""
