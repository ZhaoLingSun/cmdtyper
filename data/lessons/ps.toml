ace         2156     2150  0 09:12 pts/0    00:00:00 -bash
ace         3901     2156  0 10:36 pts/0    00:00:00 ps -ef"""

output_explanation = "输出列出了进程信息。常见字段包括 PID、CPU、MEM、启动时间和命令，用于定位高负载或异常进程。"
[[examples.token_details]]
token = "-ef"
explanation = "使用完整格式显示进程信息（常见于 ps）。"

