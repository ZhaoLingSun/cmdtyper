[[gotchas]]
title = "ps 只显示瞬时快照"
content = """ps 显示的是命令执行那一刻的进程状态快照，不会实时更新。如果需要实时监控进程，\
应该使用 top 或 htop 命令。top 会每隔几秒自动刷新显示。"""

[[gotchas]]
title = "BSD 风格和 POSIX 风格不要混用"
content = """ps 支持两种截然不同的选项风格：
- BSD 风格（不带 -）：ps aux
- POSIX 风格（带 -）：ps -ef

两种风格的输出列名和格式都不同。例如 BSD 用 COMMAND，POSIX 用 CMD。\
不要混用两种风格，比如 ps -aux 虽然可能不报错，但含义和 ps aux 不同。\
-aux 在 POSIX 中意味着"显示用户名为 x 的进程"。"""
