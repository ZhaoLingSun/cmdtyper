[meta]
command = "ps"
full_name = "process status"
category = "process"
difficulty = "basic"
importance = "core"

[overview]
summary = "显示当前系统中运行的进程信息"
explanation = """ps 是 Linux 中最常用的进程查看命令之一。它可以显示当前系统中正在运行的进程的\
快照信息，包括进程 ID（PID）、CPU 和内存使用率、运行时间、命令名称等。

ps 有两套风格的选项语法：
- BSD 风格：不带短横线，如 ps aux
- POSIX/Unix 风格：带短横线，如 ps -ef

两种风格的输出格式略有不同，但都能查看系统中的进程。在实际工作中，ps 经常和 grep 配合使用，\
用于查找特定进程。如果需要实时监控进程，应使用 top 或 htop 命令。"""

[syntax]
basic = "ps [选项]"
[[syntax.parts]]
name = "选项"
desc = "控制输出格式和显示范围的参数，支持 BSD 和 POSIX 两种风格"

[[options]]
flag = "aux"
name = "显示所有用户的所有进程（BSD 风格）"
example = "ps aux"
note = "a=所有用户, u=用户格式, x=包含无终端进程。注意不带短横线"

[[options]]
flag = "-ef"
name = "显示所有进程的完整信息（POSIX 风格）"
example = "ps -ef"
note = "e=所有进程, f=完整格式。带短横线的 POSIX 风格"

[[options]]
flag = "-p"
name = "按 PID 查看指定进程"
example = "ps -p 1234"
note = "可以指定多个 PID，用逗号分隔：ps -p 1,2,3"

[[options]]
flag = "--sort"
name = "按指定字段排序"
example = "ps aux --sort=-%mem"
note = "- 表示降序，+ 或不加表示升序。常用字段：%cpu, %mem, pid, time"

[[options]]
flag = "-o"
name = "自定义输出列"
example = "ps -eo pid,user,%cpu,%mem,comm"
note = "常用列名：pid, ppid, user, %cpu, %mem, vsz, rss, tty, stat, time, comm, args"

[[options]]
flag = "--forest"
name = "以树形结构显示进程层级关系"
example = "ps -ef --forest"
note = "用 ASCII 字符画出父子进程关系，便于理解进程层次结构"

[[examples]]
level = 1
command = "ps aux"
summary = "查看所有用户的所有进程（BSD 风格）"
simulated_output = """USER         PID %CPU %MEM    VSZ   RSS TTY      STAT START   TIME COMMAND
root           1  0.0  0.1 169436 13260 ?        Ss   Mar01   0:08 /sbin/init
root           2  0.0  0.0      0     0 ?        S    Mar01   0:00 [kthreadd]
root         873  0.0  0.2 274452 18924 ?        Ssl  Mar01   0:03 /usr/lib/accountsservice/accounts-daemon
syslog       921  0.0  0.0 224344  5312 ?        Ssl  Mar01   0:01 /usr/sbin/rsyslogd -n
root         934  0.0  0.1  15420  9440 ?        Ss   Mar01   0:00 /usr/sbin/sshd -D
www-data    1205  0.1  0.5 456780 42360 ?        S    Mar02   1:24 nginx: worker process
mysql       1342  0.3  2.1 1843200 172032 ?      Ssl  Mar01   5:47 /usr/sbin/mysqld
ace         2156  0.0  0.1  10692  5888 pts/0    Ss   09:12   0:00 -bash
ace         3847  0.0  0.0  10072  3456 pts/0    R+   10:35   0:00 ps aux"""

output_explanation = "输出列出了进程信息。常见字段包括 PID、CPU、MEM、启动时间和命令，用于定位高负载或异常进程。"
[[examples.token_details]]
token = "aux"
explanation = "命令参数，用于指定要处理的对象或行为细节。"

[[examples]]
level = 1
command = "ps -ef"
summary = "查看所有进程的完整信息（POSIX 风格）"
simulated_output = """UID          PID    PPID  C STIME TTY          TIME CMD
root           1       0  0 Mar01 ?        00:00:08 /sbin/init
root           2       0  0 Mar01 ?        00:00:00 [kthreadd]
root         873       1  0 Mar01 ?        00:00:03 /usr/lib/accountsservice/accounts-daemon
syslog       921       1  0 Mar01 ?        00:00:01 /usr/sbin/rsyslogd -n
root         934       1  0 Mar01 ?        00:00:00 /usr/sbin/sshd -D
www-data    1205     1180  0 Mar02 ?        00:01:24 nginx: worker process
