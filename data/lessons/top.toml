[[gotchas]]
title = "top 中的交互快捷键"
content = """在 top 运行中可以使用以下快捷键：
  M — 按内存使用排序
  P — 按 CPU 使用排序（默认）
  T — 按运行时间排序
  k — 输入 PID 杀死进程
  r — 输入 PID 调整 nice 值
  u — 过滤只显示指定用户
  1 — 显示每个 CPU 核心的使用情况
  c — 切换显示完整命令行
  q — 退出 top

建议安装 htop（sudo apt install htop）作为 top 的替代品，
htop 提供更友好的彩色界面、鼠标支持和更直观的进程树视图。"""

[[gotchas]]
title = "Load Average 的含义"
content = """top 顶部显示的 load average 是系统负载平均值（1分钟、5分钟、15分钟）：
  load average: 0.52, 0.38, 0.31

解读方法：
  - 单核 CPU：load = 1.0 表示 CPU 刚好 100% 满载
  - 4 核 CPU：load = 4.0 表示所有核心都满载
  - 一般来说 load 不应长期超过 CPU 核心数

如果 load average 持续高于核心数，说明系统过载：
  - %us (user) 高 → CPU 密集型应用消耗
  - %wa (wait) 高 → 磁盘 I/O 瓶颈
  - %sy (system) 高 → 内核/系统调用开销大"""
