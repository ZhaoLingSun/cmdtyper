[meta]
command = "top"
full_name = "table of processes"
category = "process"
difficulty = "basic"
importance = "core"

[overview]
summary = "实时显示系统进程和资源使用情况"
explanation = """top 是 Linux 中最重要的系统监控工具之一，可以实时显示 CPU、内存使用情况\
以及各个进程的资源占用。它提供了一个动态更新的进程列表，默认每 3 秒刷新一次。\
top 界面分为两部分：上方的系统摘要区域显示整体的 CPU、内存、负载信息，\
下方的进程列表按 CPU 使用率排序显示各进程的详细信息。\
在排查系统性能问题时，top 通常是第一个使用的工具。\
现代 Linux 系统中还有 htop（更美观的交互界面）可以替代 top。"""

[syntax]
basic = "top [选项]"
[[syntax.parts]]
name = "选项"
desc = "控制显示内容和更新频率"

[[options]]
flag = "-d"
name = "刷新间隔"
example = "top -d 1"
note = "设置刷新间隔秒数（默认 3 秒）"

[[options]]
flag = "-p"
name = "指定进程"
example = "top -p 1234,5678"
note = "只监控指定 PID 的进程"

[[options]]
flag = "-u"
name = "指定用户"
example = "top -u ace"
note = "只显示指定用户的进程"

[[options]]
flag = "-n"
name = "刷新次数"
example = "top -bn1"
note = "刷新 N 次后退出，配合 -b 用于脚本"

[[options]]
flag = "-b"
name = "批处理模式"
example = "top -bn1 > top_snapshot.txt"
note = "非交互式输出，可重定向到文件"

[[options]]
flag = "-H"
name = "显示线程"
example = "top -H -p 1234"
note = "显示每个线程而不是每个进程"

