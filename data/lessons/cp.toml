[[gotchas]]
title = "cp 默认覆盖不提示"
content = """cp 默认不会在覆盖已有文件时提示确认，这可能导致重要文件被意外覆盖。
建议：
  - 重要操作使用 cp -i（交互确认）
  - 可以在 ~/.bashrc 中设置 alias cp='cp -i' 使其默认提示
  - 注意：即使设置了 alias，在脚本中 cp 仍然不会提示

另一个常见问题是忘记 -r 选项复制目录：
  cp mydir /tmp/          — 错误！会提示 "omitting directory"
  cp -r mydir /tmp/       — 正确"""

[[gotchas]]
title = "复制符号链接的行为"
content = """默认情况下，cp 会跟随符号链接复制链接指向的实际文件内容。
如果你想保留符号链接本身（不跟随），需要使用 -d 或 -a 选项：
  cp link.txt /tmp/       — 复制的是链接指向的文件内容
  cp -d link.txt /tmp/    — 复制的是符号链接本身
  cp -a src/ dst/         — 归档模式，保留所有符号链接"""
