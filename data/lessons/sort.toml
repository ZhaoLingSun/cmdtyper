[[gotchas]]
title = "字典序与数值排序的区别"
content = """sort 默认使用字典序（按 ASCII 码逐字符比较），这与数值排序的结果不同：
  字典序：1, 10, 11, 2, 20, 3, 9（按字符逐位比较）
  数值序：1, 2, 3, 9, 10, 11, 20（按数字大小比较）

处理数字时一定要加 -n 选项！常见场景：
  sort -n              — 纯数字排序
  sort -t: -k3 -n      — 按第三字段数值排序
  sort -h              — 支持 K/M/G 后缀的数值排序
  sort -V              — 版本号排序（1.2 < 1.10 < 2.0）"""

[[gotchas]]
title = "sort 的稳定性和 locale"
content = """sort 默认受系统 locale 影响，不同 locale 下排序结果可能不同。
如果需要确定的排序结果，可以设置：
  LC_ALL=C sort file.txt
C locale 按纯 ASCII 码排序，速度更快且结果可预测。

另外，sort 默认是稳定排序，即相等的行保持原始顺序。
如果要去重建议用 sort -u 而不是 sort | uniq，
因为 sort -u 更高效（在排序过程中直接去重）。"""
