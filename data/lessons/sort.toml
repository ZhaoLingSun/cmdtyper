[meta]
command = "sort"
full_name = "sort"
category = "text_process"
difficulty = "basic"
importance = "core"

[overview]
summary = "对文本行进行排序"
explanation = """sort 命令对文本行进行排序输出。默认按字典序（ASCII 码顺序）升序排列，\
可以通过选项实现数值排序、反向排序、按指定字段排序等功能。\
sort 是管道操作中最常用的工具之一，常与 uniq（去重）、head/tail（截取）配合使用。\
例如经典的词频统计管道：sort | uniq -c | sort -rn。\
sort 可以处理非常大的文件，它使用临时文件进行外部排序，\
因此不受内存限制。支持多种排序键和分隔符，能满足复杂的排序需求。"""

[syntax]
basic = "sort [选项] [文件]..."
[[syntax.parts]]
name = "选项"
desc = "控制排序方式、字段分隔符等"
[[syntax.parts]]
name = "文件"
desc = "要排序的文件，省略时从标准输入读取"

[[options]]
flag = "-n"
name = "数值排序"
example = "sort -n numbers.txt"
note = "按数值大小而非字典序排序，如 2 < 10（字典序 10 < 2）"

[[options]]
flag = "-r"
name = "反向排序"
example = "sort -r names.txt"
note = "降序排列（从大到小/从 Z 到 A）"

[[options]]
flag = "-k"
name = "指定排序字段"
example = "sort -k2 data.txt"
note = "按第 N 个字段排序，可以指定范围如 -k2,2 表示仅第二字段"

[[options]]
flag = "-t"
name = "指定分隔符"
example = "sort -t: -k3 -n /etc/passwd"
note = "设置字段分隔符，默认是空白字符"

[[options]]
flag = "-u"
name = "去重排序"
example = "sort -u names.txt"
note = "排序的同时去除重复行，等同于 sort | uniq"

[[options]]
flag = "-h"
name = "人类可读数值排序"
example = "du -sh * | sort -h"
note = "理解 K/M/G 等后缀的大小关系（2K < 1M < 3G）"

[[examples]]
level = 1
command = "sort names.txt"
summary = "按字母顺序排列文件中的名字"
simulated_output = """Alice
Bob
Charlie
Diana
Eve
Frank"""

output_explanation = "输出是排序后的结果，排序规则受数字/逆序/字段键影响。可结合 `-t` 与 `-k` 控制按哪一列排序。"
[[examples.token_details]]
token = "names.txt"
explanation = "输入或输出文件名，命令会对这个文件进行读取/写入/处理。"

[[examples]]
level = 2
command = "sort -rn scores.txt"
summary = "按数值从大到小排列分数"
simulated_output = """98
95
87
82
76
65"""

output_explanation = "输出是排序后的结果，排序规则受数字/逆序/字段键影响。可结合 `-t` 与 `-k` 控制按哪一列排序。"
[[examples.token_details]]
token = "-rn"
explanation = "命令参数，用于指定要处理的对象或行为细节。"

[[examples.token_details]]
token = "scores.txt"
explanation = "输入或输出文件名，命令会对这个文件进行读取/写入/处理。"

[[examples]]
level = 2
command = "sort -t: -k3 -n /etc/passwd | head -5"
summary = "按 UID（第3字段）数值排序 /etc/passwd 并显示前 5 行"
simulated_output = """root:x:0:0:root:/root:/bin/bash
daemon:x:1:1:daemon:/usr/sbin:/usr/sbin/nologin
bin:x:2:2:bin:/bin:/usr/sbin/nologin
sys:x:3:3:sys:/dev:/usr/sbin/nologin
sync:x:4:65534:sync:/bin:/bin/sync"""

output_explanation = "输出是排序后的结果，排序规则受数字/逆序/字段键影响。可结合 `-t` 与 `-k` 控制按哪一列排序。"
[[examples.token_details]]
token = "-t:"
explanation = "命令参数，用于指定要处理的对象或行为细节。"

[[examples.token_details]]
token = "-k3"
explanation = "命令参数，用于指定要处理的对象或行为细节。"

[[examples.token_details]]
token = "-n"
explanation = "指定行数/次数，或仅显示数字信息。"

[[examples.token_details]]
token = "/etc/passwd"
explanation = "指定数量（如行数、分组大小、请求次数）。"

[[examples.token_details]]
token = "|"
explanation = "管道符，把前一个命令的输出交给后一个命令继续处理。"

[[examples.token_details]]
token = "-5"
explanation = "命令参数，用于指定要处理的对象或行为细节。"

[[examples]]
