[meta]
command = "awk"
full_name = "Aho, Weinberger, Kernighan"
category = "text_process"
difficulty = "advanced"
importance = "core"

[overview]
summary = "强大的文本处理和数据提取工具"
explanation = """awk 是 Linux 中最强大的文本处理工具之一，以三位发明者的姓氏命名。\
它将每一行输入自动分割成字段（默认按空白分隔），\
通过 $1、$2 ... 引用各个字段（$0 代表整行），\
可以对数据进行提取、过滤、计算和格式化输出。\
awk 本质上是一个小型编程语言，支持变量、条件、循环、数组和函数。\
它的工作模式是"模式 { 动作 }"——对每一行，如果匹配模式就执行动作。\
特殊的 BEGIN 块在处理任何输入前执行，END 块在所有输入处理完后执行。\
在一行式命令中，awk 常用于提取特定列的数据。"""

[syntax]
basic = "awk '模式 { 动作 }' [文件]"
[[syntax.parts]]
name = "模式"
desc = "匹配条件（正则表达式、比较表达式等），省略则匹配所有行"
[[syntax.parts]]
name = "动作"
desc = "对匹配行执行的操作，如 print、计算等"

[[options]]
flag = "-F"
name = "指定分隔符"
example = "awk -F: '{print $1}' /etc/passwd"
note = "设置输入字段分隔符（默认是空白字符）"

[[options]]
flag = "-v"
name = "定义变量"
example = "awk -v threshold=90 '$3 > threshold' scores.txt"
note = "在 awk 程序外部传入变量值"

[[options]]
flag = "-f"
name = "从文件读取脚本"
example = "awk -f script.awk data.txt"
note = "从文件中读取 awk 程序（适合复杂脚本）"

[[options]]
flag = "NR"
name = "行号变量"
example = "awk 'NR==5' file.txt"
note = "内置变量，表示当前处理的行号"

[[options]]
flag = "NF"
name = "字段数变量"
example = "awk '{print NF}' file.txt"
note = "内置变量，表示当前行的字段数"

[[options]]
flag = "BEGIN/END"
name = "特殊模式"
example = "awk 'BEGIN{sum=0} {sum+=$1} END{print sum}'"
note = "BEGIN 在处理前执行，END 在处理后执行"

[[examples]]
level = 1
command = "awk '{print $1}' access.log"
summary = "提取日志文件中每行的第一个字段（IP 地址）"
simulated_output = """192.168.1.50
10.0.0.5
192.168.1.105
172.16.0.20
192.168.1.200"""

[[examples]]
level = 2
command = "awk -F: '{print $1, $3}' /etc/passwd | head -5"
summary = "以冒号为分隔符，提取用户名和 UID"
simulated_output = """root 0
daemon 1
bin 2
sys 3
sync 4"""

[[examples]]
level = 2
command = "awk '$3 > 1000' /etc/passwd"
summary = "过滤出 UID 大于 1000 的用户（模式匹配）"
simulated_output = """nobody:x:65534:65534:nobody:/nonexistent:/usr/sbin/nologin
ace:x:1000:1000:ace:/home/ace:/bin/bash"""

[[examples]]
level = 3
command = "awk '/ERROR/ {count++} END {print \"Total errors:\", count}' app.log"
summary = "统计日志中 ERROR 出现的次数"
display = "awk '/ERROR/ {count++} \\\n  END {print \"Total errors:\", count}' app.log"
simulated_output = """Total errors: 42"""

[[examples]]
level = 3
command = "df -h | awk 'NR>1 && $5+0 > 80 {print $6, $5}'"
summary = "找出磁盘使用率超过 80% 的分区"
display = "df -h | awk 'NR>1 && $5+0 > 80 \\\n  {print $6, $5}'"
simulated_output = """/var 85%
/home 92%"""

[[examples]]
level = 4
command = "awk -F: 'BEGIN {print \"User\\tUID\\tShell\"} $3>=1000 && $3<65534 {print $1\"\\t\"$3\"\\t\"$7}' /etc/passwd"
summary = "格式化输出普通用户信息（带表头）"
display = "awk -F: 'BEGIN {print \"User\\tUID\\tShell\"} \\\n  $3>=1000 && $3<65534 \\\n  {print $1\"\\t\"$3\"\\t\"$7}' /etc/passwd"
simulated_output = """User	UID	Shell
ace	1000	/bin/bash
alice	1001	/bin/bash
bob	1002	/bin/zsh
deploy	1003	/bin/bash"""

[[examples]]
level = 4
command = "awk '{sum+=$1; count++} END {printf \"Average: %.2f\\n\", sum/count}' numbers.txt"
summary = "计算文件中数字的平均值"
display = "awk '{sum+=$1; count++} \\\n  END {printf \"Average: %.2f\\n\", sum/count}' \\\n  numbers.txt"
simulated_output = """Average: 78.35"""

[[gotchas]]
title = "awk 中 $0 与 $1 的区别"
content = """awk 的字段引用：
  $0  — 整行内容
  $1  — 第 1 个字段
  $2  — 第 2 个字段
  $NF — 最后一个字段
  $(NF-1) — 倒数第二个字段

注意 $ 后面可以是表达式：
  n=3; awk -v n=$n '{print $n}'  — 打印第 n 个字段

另外，awk 的字段分隔默认是任意空白字符（空格和 Tab 的组合），
多个连续空格算一个分隔符。要按单个字符分隔用 -F。"""

[[gotchas]]
title = "awk 与 Shell 引号冲突"
content = """awk 程序通常用单引号包裹，避免 Shell 解析其中的 $ 符号：
  awk '{print $1}'        ✓ 单引号，$1 是 awk 的字段引用
  awk "{print $1}"        ✗ 双引号，$1 会被 Shell 替换为参数

如果需要在 awk 中使用 Shell 变量，用 -v 传递：
  awk -v name="$USER" '{print name, $1}' file
  而不是：awk '{print "'$USER'", $1}'（容易出错且不安全）"""
