[meta]
command = "tar"
full_name = "tape archive"
category = "archive"
difficulty = "basic"
importance = "core"

[overview]
summary = "打包和压缩文件归档"
explanation = """tar 是 Linux 中最常用的归档工具，名称来源于 "tape archive"（磁带归档）。\
tar 本身只负责将多个文件打包成一个归档文件（.tar），\
通常配合压缩工具（gzip、bzip2、xz）一起使用来减小文件大小。\
最常见的组合是 tar + gzip（生成 .tar.gz 或 .tgz 文件）。\
tar 的核心操作只有三个：创建归档（c）、查看内容（t）、解压归档（x），\
配合压缩选项（z=gzip, j=bzip2, J=xz）就能覆盖日常所有归档需求。\
记住口诀：czf 压缩、xzf 解压、tzf 查看。"""

[syntax]
basic = "tar [选项] [归档文件] [文件...]"
[[syntax.parts]]
name = "归档文件"
desc = "归档文件的路径，通常以 .tar.gz、.tgz、.tar.bz2 等结尾"
[[syntax.parts]]
name = "文件"
desc = "要打包的文件或目录（创建归档时使用）"

[[options]]
flag = "-c"
name = "创建归档"
example = "tar -cf archive.tar files/"
note = "创建新的归档文件"

[[options]]
flag = "-x"
name = "解压归档"
example = "tar -xf archive.tar.gz"
note = "从归档中提取文件"

[[options]]
flag = "-t"
name = "查看内容"
example = "tar -tf archive.tar.gz"
note = "列出归档中的文件列表而不解压"

[[options]]
flag = "-z"
name = "gzip 压缩"
example = "tar -czf archive.tar.gz files/"
note = "使用 gzip 压缩/解压（.tar.gz 或 .tgz）"

[[options]]
flag = "-j"
name = "bzip2 压缩"
example = "tar -cjf archive.tar.bz2 files/"
note = "使用 bzip2 压缩（压缩率更高但速度较慢）"

[[options]]
flag = "-v"
name = "显示详情"
example = "tar -czvf archive.tar.gz files/"
note = "显示正在处理的文件名"

[[options]]
flag = "-C"
name = "指定解压目录"
example = "tar -xzf archive.tar.gz -C /opt/"
note = "将文件解压到指定目录"

[[options]]
flag = "--exclude"
name = "排除文件"
example = "tar -czf backup.tar.gz --exclude='*.log' project/"
note = "排除匹配模式的文件"

[[examples]]
level = 1
command = "tar -czf project.tar.gz project/"
summary = "将 project 目录打包并用 gzip 压缩"
