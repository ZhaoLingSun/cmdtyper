[[gotchas]]
title = "tar 选项中 f 必须在最后"
content = """tar 的 -f 选项后面必须紧跟归档文件名，因此 f 通常放在选项组合的最后：
  tar -czf archive.tar.gz files/   ✓  f 后面是文件名
  tar -cfz archive.tar.gz files/   ✗  f 后面变成了 z！

另外，现代 GNU tar 可以自动检测压缩格式，解压时可以省略 z/j/J：
  tar -xf archive.tar.gz    ✓ 自动检测 gzip
  tar -xf archive.tar.bz2   ✓ 自动检测 bzip2
  tar -xf archive.tar.xz    ✓ 自动检测 xz
但创建归档时必须指定压缩选项。"""

[[gotchas]]
title = "tar 解压时注意目录结构"
content = """解压 tar 归档时，需要注意归档内的目录结构：
  1. 如果归档的根目录是 project/，解压后会创建 project/ 目录
  2. 如果归档没有根目录，文件会直接散落在当前目录

安全做法：先用 tar -tf 查看内容，再决定如何解压：
  tar -tf unknown.tar.gz | head -10
  如果文件没有统一的根目录，建议创建一个目录再解压到其中：
  mkdir output && tar -xzf unknown.tar.gz -C output/

另外注意带绝对路径的归档（以 / 开头的路径）可能覆盖系统文件！
GNU tar 默认会去掉前导 /，但使用第三方打包的归档时要警惕。"""
