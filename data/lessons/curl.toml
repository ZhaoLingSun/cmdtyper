[meta]
command = "curl"
full_name = "Client URL"
category = "network"
difficulty = "basic"
importance = "core"

[overview]
summary = "命令行 HTTP 工具，用于发送请求和下载数据"
explanation = """curl 是功能极其强大的命令行数据传输工具，支持 HTTP、HTTPS、FTP 等多种协议。\
它是 API 开发和调试中最常用的工具，可以发送各种 HTTP 请求（GET、POST、PUT、DELETE），\
自定义请求头、发送 JSON 数据、处理 Cookie、跟踪重定向等。\
几乎所有的 API 文档都会提供 curl 示例命令。\
curl 默认将响应输出到终端（stdout），适合在管道中使用。\
如果需要下载文件保存到本地，使用 -o 或 -O 选项。\
掌握 curl 是 Web 开发和运维的必备技能。"""

[syntax]
basic = "curl [选项] URL"
[[syntax.parts]]
name = "URL"
desc = "请求的目标地址"

[[options]]
flag = "-o"
name = "保存到文件"
example = "curl -o file.html https://example.com"
note = "将输出保存到指定文件名（小写 o）"

[[options]]
flag = "-O"
name = "保存为原文件名"
example = "curl -O https://example.com/file.tar.gz"
note = "使用 URL 中的文件名保存（大写 O）"

[[options]]
flag = "-X"
name = "指定请求方法"
example = "curl -X POST https://api.example.com/users"
note = "设置 HTTP 方法：GET、POST、PUT、DELETE、PATCH 等"

[[options]]
flag = "-H"
name = "自定义请求头"
example = "curl -H 'Content-Type: application/json' URL"
note = "添加或覆盖 HTTP 请求头，可以多次使用"

[[options]]
flag = "-d"
name = "发送数据"
example = "curl -d '{\"name\":\"alice\"}' URL"
note = "发送 POST 数据，自动设置方法为 POST"

[[options]]
flag = "-v"
name = "详细输出"
example = "curl -v https://example.com"
note = "显示完整的请求和响应头信息，用于调试"

[[options]]
flag = "-s"
name = "静默模式"
example = "curl -s https://api.example.com/data | jq"
note = "不显示进度条和错误信息，适合脚本和管道"

[[options]]
flag = "-I"
name = "仅获取响应头"
example = "curl -I https://example.com"
note = "发送 HEAD 请求，只返回 HTTP 响应头"

[[examples]]
level = 1
command = "curl https://api.github.com/zen"
summary = "发送简单的 GET 请求"
simulated_output = """Responsive is better than fast."""

[[examples]]
level = 2
command = "curl -I https://example.com"
summary = "查看网站的 HTTP 响应头"
simulated_output = """HTTP/2 200
accept-ranges: bytes
age: 526834
cache-control: max-age=604800
content-type: text/html; charset=UTF-8
date: Mon, 09 Mar 2026 06:23:15 GMT
etag: "3147526947+gzip"
expires: Mon, 16 Mar 2026 06:23:15 GMT
last-modified: Thu, 17 Oct 2019 07:18:26 GMT
server: ECAcc (sac/254D)
x-cache: HIT
content-length: 1256"""

[[examples]]
level = 2
command = "curl -s https://api.github.com/users/torvalds | jq '.name, .bio'"
summary = "获取 GitHub 用户信息并用 jq 提取字段"
display = "curl -s https://api.github.com/users/torvalds \\\n  | jq '.name, .bio'"
simulated_output = """"Linus Torvalds"
null"""

[[examples]]
level = 3
command = "curl -X POST -H 'Content-Type: application/json' -d '{\"username\":\"alice\",\"email\":\"alice@example.com\"}' https://api.example.com/users"
summary = "发送 JSON 格式的 POST 请求创建用户"
display = "curl -X POST \\\n  -H 'Content-Type: application/json' \\\n  -d '{\"username\":\"alice\",\"email\":\"alice@example.com\"}' \\\n  https://api.example.com/users"
simulated_output = """{"id":42,"username":"alice","email":"alice@example.com","created_at":"2026-03-09T14:30:00Z"}"""

[[examples]]
level = 3
command = "curl -v -u admin:secret https://api.example.com/admin/stats"
summary = "使用 Basic Auth 认证访问受保护的 API"
display = "curl -v -u admin:secret \\\n  https://api.example.com/admin/stats"
simulated_output = """*   Trying 93.184.216.34:443...
* Connected to api.example.com port 443
> GET /admin/stats HTTP/2
> Host: api.example.com
> Authorization: Basic YWRtaW46c2VjcmV0
> User-Agent: curl/8.5.0
> Accept: */*
>
< HTTP/2 200
< content-type: application/json
< date: Mon, 09 Mar 2026 14:30:00 GMT
<
{"users":1234,"active_today":567,"requests_per_minute":89}"""

[[examples]]
level = 4
command = "curl -s -w '\\nHTTP_CODE: %{http_code}\\nTIME_TOTAL: %{time_total}s\\nSIZE: %{size_download} bytes\\n' -o /dev/null https://example.com"
summary = "测量网站的响应时间和状态码"
display = "curl -s -w '\\nHTTP_CODE: %{http_code}\\n\\\n  TIME_TOTAL: %{time_total}s\\n\\\n  SIZE: %{size_download} bytes\\n' \\\n  -o /dev/null https://example.com"
simulated_output = """
HTTP_CODE: 200
TIME_TOTAL: 0.234s
SIZE: 1256 bytes"""

[[gotchas]]
title = "curl 的引号和特殊字符"
content = """在 curl 命令中传递 JSON 数据时，需要注意 Shell 引号嵌套：
  curl -d '{"name":"alice"}'     — 外层单引号，内层双引号 ✓
  curl -d "{\"name\":\"alice\"}"  — 外层双引号，内层转义 ✓
  curl -d "{"name":"alice"}"     — 错误！双引号嵌套未转义 ✗

对于复杂的 JSON 数据，可以从文件读取：
  curl -d @data.json -H 'Content-Type: application/json' URL
  @ 前缀告诉 curl 从文件中读取数据。"""

[[gotchas]]
title = "-d 与 -F 的区别"
content = """curl 发送 POST 数据有两种主要方式：
  -d / --data：发送 URL 编码或原始数据
    Content-Type 默认为 application/x-www-form-urlencoded
    发送 JSON 时需要手动设置 Content-Type: application/json

  -F / --form：发送 multipart/form-data 格式
    主要用于文件上传
    curl -F 'file=@photo.jpg' -F 'name=avatar' URL

常见错误是上传文件时用 -d 而不是 -F，
-d 会把文件名当作字符串发送，-F 才会正确上传文件内容。"""
