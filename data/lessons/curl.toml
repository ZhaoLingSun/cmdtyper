[[examples]]
level = 2
command = "curl -s https://api.github.com/users/torvalds | jq '.name, .bio'"
summary = "获取 GitHub 用户信息并用 jq 提取字段"
display = "curl -s https://api.github.com/users/torvalds \\\n  | jq '.name, .bio'"
simulated_output = """"Linus Torvalds"
null"""

output_explanation = "这是 curl 请求返回的示例内容，可能是响应体、响应头或状态统计信息。排障时重点看 HTTP 状态码、关键头部和返回正文是否与接口文档一致。"
[[examples.token_details]]
token = "-s"
explanation = "静默模式、包大小或排序方式（取决于命令）。"

[[examples.token_details]]
token = "https://api.github.com/users/torvalds"
explanation = "指定数据包大小或其他尺寸参数。"

[[examples.token_details]]
token = "|"
explanation = "管道符，把前一个命令的输出交给后一个命令继续处理。"

[[examples.token_details]]
