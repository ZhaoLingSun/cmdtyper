[[gotchas]]
title = "curl 的引号和特殊字符"
content = """在 curl 命令中传递 JSON 数据时，需要注意 Shell 引号嵌套：
  curl -d '{"name":"alice"}'     — 外层单引号，内层双引号 ✓
  curl -d "{\"name\":\"alice\"}"  — 外层双引号，内层转义 ✓
  curl -d "{"name":"alice"}"     — 错误！双引号嵌套未转义 ✗

对于复杂的 JSON 数据，可以从文件读取：
  curl -d @data.json -H 'Content-Type: application/json' URL
  @ 前缀告诉 curl 从文件中读取数据。"""

[[gotchas]]
title = "-d 与 -F 的区别"
content = """curl 发送 POST 数据有两种主要方式：
  -d / --data：发送 URL 编码或原始数据
    Content-Type 默认为 application/x-www-form-urlencoded
    发送 JSON 时需要手动设置 Content-Type: application/json

  -F / --form：发送 multipart/form-data 格式
    主要用于文件上传
    curl -F 'file=@photo.jpg' -F 'name=avatar' URL

常见错误是上传文件时用 -d 而不是 -F，
-d 会把文件名当作字符串发送，-F 才会正确上传文件内容。"""
