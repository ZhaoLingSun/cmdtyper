[meta]
command = "uniq"
full_name = "unique"
category = "text_process"
difficulty = "basic"
importance = "common"

[overview]
summary = "去除或统计文件中的重复行"
explanation = """uniq 命令用于检测和处理文件中相邻的重复行。\
它可以去除重复行、统计重复次数、只显示重复行或只显示唯一行。\
关键点：uniq 只处理相邻的重复行，因此通常需要先用 sort 排序。\
经典用法是 sort file | uniq -c | sort -rn，用于统计词频或日志中的重复条目。\
uniq 虽然简单，但在数据处理管道中是不可或缺的环节。"""

[syntax]
basic = "uniq [选项] [输入文件 [输出文件]]"
[[syntax.parts]]
name = "输入文件"
desc = "要处理的文件，省略时从标准输入读取"
[[syntax.parts]]
name = "输出文件"
desc = "输出到指定文件，省略时输出到标准输出"

[[options]]
flag = "-c"
name = "计数"
example = "sort data.txt | uniq -c"
note = "在每行前显示该行出现的次数"

[[options]]
flag = "-d"
name = "仅显示重复行"
example = "sort list.txt | uniq -d"
note = "只输出有重复的行（每组重复只输出一次）"

[[options]]
flag = "-u"
name = "仅显示唯一行"
example = "sort list.txt | uniq -u"
note = "只输出没有重复的行"

[[options]]
flag = "-i"
name = "忽略大小写"
example = "sort data.txt | uniq -ic"
note = "比较时忽略大小写差异"

[[options]]
flag = "-f"
name = "跳过字段"
example = "uniq -f 1 data.txt"
note = "比较时跳过前 N 个字段（空格分隔）"

[[options]]
flag = "-w"
name = "限制比较字符数"
example = "uniq -w 10 data.txt"
note = "只比较每行前 N 个字符"

[[examples]]
level = 1
command = "sort names.txt | uniq"
summary = "排序后去除重复的名字"
simulated_output = """Alice
Bob
Charlie
Diana
Eve"""

output_explanation = "输出是排序后的结果，排序规则受数字/逆序/字段键影响。可结合 `-t` 与 `-k` 控制按哪一列排序。"
[[examples.token_details]]
token = "names.txt"
explanation = "输入或输出文件名，命令会对这个文件进行读取/写入/处理。"

[[examples.token_details]]
token = "|"
explanation = "管道符，把前一个命令的输出交给后一个命令继续处理。"

[[examples]]
