[[gotchas]]
title = "uniq 只去除相邻的重复行"
content = """这是 uniq 最常见的陷阱。uniq 只比较相邻行是否相同：
  文件内容：          uniq 结果：
  apple               apple
  banana              banana
  apple               apple      ← apple 不相邻，不被去重！
  banana              banana

正确做法是先排序再去重：
  sort file.txt | uniq     — 先排序使相同行相邻，再去重
  sort -u file.txt         — 更简洁的写法，排序同时去重"""

[[gotchas]]
title = "uniq -c 的输出格式"
content = """uniq -c 在每行前面加上计数，但输出格式有固定的前导空格：
      3 Alice
      1 Bob

后续处理时需要注意前导空格。用 sort -rn 排序时会自动忽略前导空格。
如果需要去掉前导空格，可以用：
  sort file | uniq -c | sort -rn | sed 's/^[ ]*//'
或者：
  sort file | uniq -c | sort -rn | awk '{print $1, $2}'"""
