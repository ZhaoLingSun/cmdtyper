[[gotchas]]
title = "mv 不需要 -r 选项移动目录"
content = """与 cp 不同，mv 移动目录时不需要加 -r 选项：
  cp -r mydir /backup/    — 复制目录需要 -r
  mv mydir /backup/       — 移动目录不需要 -r

这是因为在同一文件系统内，mv 只是修改目录的元数据（重新链接），
并不需要递归处理每个文件。"""

[[gotchas]]
title = "mv 默认覆盖已有文件"
content = """mv 和 cp 一样，默认会直接覆盖目标位置的已有文件而不提示。
建议在 ~/.bashrc 中添加：
  alias mv='mv -i'
这样每次覆盖前都会询问确认。

在脚本中如果确实需要覆盖，可以使用 mv -f 或 \\mv（反斜杠跳过 alias）。"""
