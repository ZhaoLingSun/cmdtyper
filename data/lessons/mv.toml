[meta]
command = "mv"
full_name = "move"
category = "file_ops"
difficulty = "beginner"
importance = "core"

[overview]
summary = "移动或重命名文件和目录"
explanation = """mv 命令用于移动文件/目录到新位置，或者重命名文件/目录。\
与 cp 不同，mv 不会在原位置保留副本——文件被移到新位置后，原路径不再存在。\
在同一文件系统内移动文件时，mv 只修改目录项（非常快），不实际复制数据；\
跨文件系统移动时则先复制再删除原文件。\
mv 也是重命名文件和目录的标准方式，Linux 没有专门的 rename 命令。\
和 cp 一样，mv 默认覆盖已有文件时不提示，操作重要文件时请加 -i。"""

[syntax]
basic = "mv [选项] 源... 目标"
[[syntax.parts]]
name = "源"
desc = "要移动或重命名的文件/目录，可以指定多个"
[[syntax.parts]]
name = "目标"
desc = "目标路径。如果是已存在的目录则移入其中；否则作为新名称"

[[options]]
flag = "-i"
name = "交互确认"
example = "mv -i old.txt new.txt"
note = "覆盖已有文件前询问确认"

[[options]]
flag = "-v"
name = "显示详情"
example = "mv -v *.log /archive/"
note = "显示每个被移动/重命名的文件"

[[options]]
flag = "-n"
name = "不覆盖"
example = "mv -n source.txt dest.txt"
note = "如果目标已存在则不覆盖（no-clobber）"

[[options]]
flag = "-f"
name = "强制覆盖"
example = "mv -f draft.txt final.txt"
note = "覆盖已有文件时不询问（默认行为，用于覆盖 -i alias）"

[[options]]
flag = "-u"
name = "仅更新"
example = "mv -u *.txt /backup/"
note = "仅当源文件比目标文件新时才移动"

[[options]]
flag = "--backup"
name = "创建备份"
example = "mv --backup=numbered file.txt file.txt"
note = "覆盖前先备份已有文件，numbered 模式生成编号备份"

[[examples]]
level = 1
command = "mv old.txt new.txt"
summary = "将 old.txt 重命名为 new.txt"
simulated_output = ""

output_explanation = "该命令成功时通常不会在终端产生可见输出；没有报错并返回提示符一般就表示执行成功。建议随后用相关检查命令（如 `pwd`、`ls`、`stat`）确认结果。"
[[examples.token_details]]
token = "old.txt"
explanation = "输入或输出文件名，命令会对这个文件进行读取/写入/处理。"

[[examples.token_details]]
token = "new.txt"
explanation = "输入或输出文件名，命令会对这个文件进行读取/写入/处理。"

