[meta]
command = "find"
full_name = "find"
category = "search"
difficulty = "basic"
importance = "core"

[overview]
summary = "在目录树中搜索文件和目录"
explanation = """find 是 Linux 中功能最强大的文件搜索命令。与 ls 只能列出当前目录不同，\
find 可以递归搜索整个目录树，并根据文件名、类型、大小、修改时间、权限等\
多种条件来查找文件。find 还可以对找到的文件执行操作（如删除、移动、修改权限等），\
这使它成为系统管理和自动化脚本中不可或缺的工具。\
find 的搜索条件可以灵活组合，支持逻辑与（-a）、逻辑或（-o）、逻辑非（!）。\
虽然 find 的语法相比其他命令稍显复杂，但一旦掌握，它将极大提升你管理文件系统的能力。"""

[syntax]
basic = "find [搜索路径] [搜索条件] [执行动作]"
[[syntax.parts]]
name = "搜索路径"
desc = "从哪个目录开始搜索，省略时默认为当前目录"
[[syntax.parts]]
name = "搜索条件"
desc = "过滤条件，如 -name、-type、-size、-mtime 等"
[[syntax.parts]]
name = "执行动作"
desc = "对找到的文件执行的操作，如 -exec、-delete、-print 等"

[[options]]
flag = "-name"
name = "按文件名搜索"
example = "find /home -name '*.txt'"
note = "支持通配符 * 和 ?，模式必须用引号包裹以避免 shell 展开"

[[options]]
flag = "-type"
name = "按文件类型搜索"
example = "find /var -type d"
note = "f=普通文件, d=目录, l=符号链接, s=套接字, p=管道"

[[options]]
flag = "-size"
name = "按文件大小搜索"
example = "find /tmp -size +100M"
note = "+100M 表示大于 100MB，-1k 表示小于 1KB，单位：c(字节) k(KB) M(MB) G(GB)"

[[options]]
flag = "-mtime"
name = "按修改时间搜索"
example = "find /var/log -mtime -7"
note = "-7 表示 7 天内修改的，+30 表示 30 天前修改的，0 表示今天修改的"

[[options]]
flag = "-exec"
name = "对结果执行命令"
example = "find /tmp -name '*.tmp' -exec rm {} \\;"
note = "{} 代表找到的每个文件，\\; 标记命令结束；用 + 代替 \\; 可批量传参提高效率"

[[options]]
flag = "-perm"
name = "按权限搜索"
example = "find / -perm -4000 -type f"
note = "-4000 表示搜索设置了 SUID 位的文件，常用于安全审计"

[[examples]]
level = 1
command = "find /home/alice -name '*.pdf'"
summary = "在主目录下搜索所有 PDF 文件"
simulated_output = """/home/alice/Documents/report-2026.pdf
/home/alice/Documents/meeting-notes.pdf
/home/alice/Downloads/user-manual.pdf
/home/alice/Downloads/invoice-march.pdf
/home/alice/Desktop/presentation.pdf"""

[[examples]]
level = 2
command = "find /var/log -type f -name '*.log' -size +10M"
summary = "查找大于 10MB 的日志文件"
simulated_output = """/var/log/syslog
/var/log/kern.log
/var/log/auth.log
/var/log/nginx/access.log
/var/log/mysql/error.log"""

[[examples]]
level = 2
command = "find . -type d -name 'node_modules'"
summary = "查找当前目录下所有 node_modules 目录"
simulated_output = """./project-a/node_modules
./project-a/packages/ui/node_modules
./project-b/node_modules
./old-projects/webapp/node_modules"""

[[examples]]
level = 3
command = "find /tmp -type f -mtime +30 -exec rm -v {} \\;"
summary = "删除 /tmp 中超过 30 天的旧文件"
simulated_output = """removed '/tmp/sess_a8f3k2m1n4p5'
removed '/tmp/tmp.X8kd92Ls'
removed '/tmp/core.12345'
removed '/tmp/download.7Rkm3P'
removed '/tmp/upload_cache_old.dat'"""

[[examples]]
level = 3
command = "find /home -name '*.sh' -type f -perm -u+x"
summary = "查找所有可执行的 shell 脚本"
simulated_output = """/home/alice/scripts/backup.sh
/home/alice/scripts/deploy.sh
/home/alice/bin/cleanup.sh
/home/bob/scripts/monitor.sh
/home/bob/cron/daily-report.sh"""

[[examples]]
level = 4
command = "find ./src -name '*.py' -type f -exec grep -l 'import requests' {} +"
summary = "查找所有导入了 requests 库的 Python 文件"
simulated_output = """./src/api/client.py
./src/services/webhook.py
./src/utils/downloader.py
./src/tests/test_api.py"""

[[examples]]
level = 4
command = "find / -type f -perm -4000 -ls 2>/dev/null"
summary = "安全审计：查找系统中所有 SUID 文件"
simulated_output = """   131073     40 -rwsr-xr-x   1 root     root        39144 Mar  7  2025 /usr/bin/newgrp
   131089     84 -rwsr-xr-x   1 root     root        85064 Mar  7  2025 /usr/bin/chfn
   131091     52 -rwsr-xr-x   1 root     root        53040 Mar  7  2025 /usr/bin/chsh
   131095     68 -rwsr-xr-x   1 root     root        68208 Mar  7  2025 /usr/bin/passwd
   131097     44 -rwsr-xr-x   1 root     root        44784 Mar  7  2025 /usr/bin/su
   131099    164 -rwsr-xr-x   1 root     root       166056 Apr  1  2025 /usr/bin/sudo
   131112     36 -rwsr-xr-x   1 root     root        35192 Mar  7  2025 /usr/bin/umount
   131115     56 -rwsr-xr-x   1 root     root        55528 Mar  7  2025 /usr/bin/mount"""

[[gotchas]]
title = "-name 区分大小写，用 -iname 忽略大小写"
content = """-name 选项在匹配文件名时是区分大小写的。例如：
  find . -name '*.txt'
不会找到 README.TXT 或 Notes.Txt 这样的文件。
如果你想忽略大小写匹配，请使用 -iname：
  find . -iname '*.txt'
这样 .txt、.TXT、.Txt 都会被匹配到。\
在跨平台项目中（比如从 Windows 拷贝过来的文件），这个区别尤其重要。"""

[[gotchas]]
title = "-exec 的语法容易出错"
content = """-exec 选项的语法比较特殊，容易写错。正确格式是：
  find . -name '*.log' -exec command {} \\;
注意以下几点：
  1. {} 代表找到的文件名，会被逐个替换
  2. \\; 表示 -exec 命令的结束，反斜杠是为了防止 shell 把分号解释掉
  3. {} 和 \\; 之间必须有空格
常见错误：
  find . -exec rm {}\\;     # 错误：{} 和 \\; 之间没有空格
  find . -exec rm {} ;      # 错误：; 没有转义（在某些 shell 中会出问题）
性能提示：将 \\; 换成 + 可以批量传参，减少命令调用次数：
  find . -name '*.tmp' -exec rm {} +
这相当于 rm file1.tmp file2.tmp file3.tmp ...，比逐个调用 rm 快很多。"""

[[gotchas]]
title = "通配符模式必须加引号"
content = """使用 -name 时，通配符模式（如 *.txt）必须用引号包裹。
错误写法：
  find . -name *.txt
如果当前目录下恰好有 .txt 文件，shell 会先展开通配符，\
导致 find 收到的不是模式字符串 *.txt，而是展开后的文件名列表，从而报错。
正确写法：
  find . -name '*.txt'
  find . -name \"*.txt\"
用引号包裹可以防止 shell 展开通配符，让 find 自己去处理模式匹配。"""
