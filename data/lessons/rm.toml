[[gotchas]]
title = "rm -rf 的致命危险"
content = """rm -rf 组合了递归（-r）和强制（-f），是 Linux 中最危险的命令之一：
  rm -rf /          — 删除整个系统（现代系统需加 --no-preserve-root）
  rm -rf ~          — 删除家目录所有文件
  rm -rf *          — 删除当前目录所有文件（含隐藏文件用 .* 就更危险）
  rm -rf $UNDEFINED — 如果变量为空，展开为 rm -rf，可能删当前目录

安全建议：
  1. 永远不要以 root 身份随意运行 rm -rf
  2. 先用 ls 查看将要删除的文件列表
  3. 使用 rm -ri 代替 rm -rf 进行交互确认
  4. 重要数据先做备份
  5. 在脚本中使用 rm 前，验证路径变量不为空"""

[[gotchas]]
title = "rm 不是移动到回收站"
content = """Linux 的 rm 是真正的删除，不像 Windows 那样移到回收站。
如果需要类似回收站的功能，可以：
  1. 使用 trash-cli 工具：trash-put file.txt（安装：sudo apt install trash-cli）
  2. 自定义 alias：alias rm='trash-put'（但脚本中仍会用真正的 rm）
  3. 设置 alias rm='rm -i' 至少在删除前有确认机会

如果不小心删除了文件，停止对该分区的一切写入操作，
然后尝试使用 extundelete 或 photorec 等工具进行数据恢复。"""
