[meta]
command = "rm"
full_name = "remove"
category = "file_ops"
difficulty = "beginner"
importance = "core"

[overview]
summary = "删除文件和目录"
explanation = """rm 是 Linux 中删除文件和目录的命令，名称来源于 "remove"。\
与 Windows 的回收站不同，Linux 的 rm 是永久删除——文件被删除后\
无法通过简单操作恢复（除非使用专业数据恢复工具且磁盘未被覆写）。\
默认情况下 rm 只能删除文件，删除目录需要加 -r（递归）选项。\
由于 rm 的破坏性，建议初学者使用 -i（交互确认）选项，\
或者在执行删除前先用 ls 确认要删除的文件列表。\
特别警告：rm -rf / 或 rm -rf * 等命令极其危险，可能导致系统完全损坏！"""

[syntax]
basic = "rm [选项] 文件..."
[[syntax.parts]]
name = "文件"
desc = "要删除的文件或目录路径，可以指定多个，支持通配符"

[[options]]
flag = "-r"
name = "递归删除"
example = "rm -r old_project/"
note = "递归删除目录及其所有内容，-R 效果相同"

[[options]]
flag = "-f"
name = "强制删除"
example = "rm -f temp.lock"
note = "不询问确认，忽略不存在的文件（不报错）"

[[options]]
flag = "-i"
name = "逐一确认"
example = "rm -i *.bak"
note = "删除每个文件前都询问确认"

[[options]]
flag = "-I"
name = "批量确认"
example = "rm -I *.log"
note = "删除超过 3 个文件或递归删除时询问一次确认"

[[options]]
flag = "-v"
name = "显示详情"
example = "rm -v *.tmp"
note = "显示每个被删除的文件名"

[[options]]
flag = "-d"
name = "删除空目录"
example = "rm -d empty_dir/"
note = "删除空目录，等同于 rmdir"

[[examples]]
level = 1
command = "rm temp.log"
summary = "删除单个文件"
simulated_output = ""

output_explanation = "该命令成功时通常不会在终端产生可见输出；没有报错并返回提示符一般就表示执行成功。建议随后用相关检查命令（如 `pwd`、`ls`、`stat`）确认结果。"
[[examples.token_details]]
token = "temp.log"
explanation = "输入或输出文件名，命令会对这个文件进行读取/写入/处理。"

[[examples]]
level = 1
command = "rm -i important.doc"
summary = "删除文件前确认"
simulated_output = """rm: remove regular file 'important.doc'? y"""

output_explanation = "该结果表示文件删除操作已执行。带 `-v` 会显示被删除对象；批量删除前务必确认匹配范围，避免误删。"
[[examples.token_details]]
token = "-i"
explanation = "启用交互确认，覆盖/删除前先询问。"

[[examples.token_details]]
token = "important.doc"
explanation = "输入文件路径，表示要删除的目标文件。"

[[examples]]
level = 2
command = "rm -rv old_project/"
summary = "递归删除整个目录并显示详情"
simulated_output = """removed 'old_project/src/main.rs'
removed 'old_project/src/lib.rs'
removed directory 'old_project/src/'
removed 'old_project/Cargo.toml'
removed 'old_project/README.md'
