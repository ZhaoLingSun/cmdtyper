# ── 易错点 ──

[[gotchas]]
title = "私钥文件权限必须严格限制"
content = """SSH 对密钥文件权限要求非常严格：
- 私钥文件（如 id_ed25519）权限必须是 600（仅所有者可读写）
- .ssh 目录权限必须是 700（仅所有者可读写执行）
- authorized_keys 文件权限必须是 600

如果权限过于宽松，SSH 会直接拒绝使用该密钥：
  @@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@
  @         WARNING: UNPROTECTED PRIVATE KEY FILE!          @
  @@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@
  Permissions 0644 for '/home/user/.ssh/id_ed25519' are too open.

修复方法：
  chmod 700 ~/.ssh
  chmod 600 ~/.ssh/id_ed25519
  chmod 600 ~/.ssh/authorized_keys"""

[[gotchas]]
title = "首次连接的主机密钥验证"
content = """首次连接新服务器时，SSH 会提示确认主机指纹：
  The authenticity of host 'server (1.2.3.4)' can't be established.
  ED25519 key fingerprint is SHA256:xxxxx
  Are you sure you want to continue connecting?

这是正常安全机制，不是报错！但如果之前连接过的服务器突然又出现此提示，\
可能意味着：
- 服务器重装了系统
- 遭受中间人攻击（Man-in-the-Middle）

遇到 "WARNING: REMOTE HOST IDENTIFICATION HAS CHANGED!" 时需要谨慎确认，\
确认安全后可用以下命令清除旧指纹：
  ssh-keygen -R 服务器地址"""

[[gotchas]]
title = "本地端口转发与远程端口转发的区别"
content = """-L（Local）本地转发：将本地端口转到远程网络
  ssh -L 本地端口:目标主机:目标端口 跳板机
  场景：通过跳板机访问内网数据库

-R（Remote）远程转发：将远程端口转到本地网络
  ssh -R 远程端口:目标主机:目标端口 远程服务器
  场景：将本地开发服务暴露到公网

记忆技巧：L = 我要访问那边的服务，R = 让那边访问我的服务"""
