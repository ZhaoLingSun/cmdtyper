[meta]
command = "ssh"
full_name = "Secure Shell"
category = "network"
difficulty = "basic"
importance = "core"

[overview]
summary = "通过加密通道安全远程登录和管理 Linux 服务器"
explanation = """SSH（Secure Shell）是 Linux 系统管理中最核心的远程访问工具。它通过加密隧道在\
客户端和服务器之间建立安全连接，替代了早期不安全的 telnet 和 rsh 协议。

SSH 的主要用途包括：
- 远程登录服务器执行命令
- 通过 SCP/SFTP 安全传输文件
- 端口转发（隧道）实现安全的网络服务访问
- 密钥认证实现免密码登录

SSH 默认使用 22 端口，支持密码认证和更安全的公钥认证。在生产环境中，\
强烈建议禁用密码登录，仅使用密钥认证。"""

[syntax]
basic = "ssh [选项] [用户名@]主机名 [命令]"
[[syntax.parts]]
name = "用户名"
desc = "远程服务器的登录用户名，省略则使用当前本地用户名"
[[syntax.parts]]
name = "主机名"
desc = "远程服务器的 IP 地址或域名"
[[syntax.parts]]
name = "命令"
desc = "可选，登录后直接执行的命令，执行完毕自动断开"

[[options]]
flag = "-p"
name = "指定端口"
example = "ssh -p 2222 user@server"
note = "当服务器 SSH 监听非默认端口时使用，注意是小写 -p"

[[options]]
flag = "-i"
name = "指定私钥文件"
example = "ssh -i ~/.ssh/id_ed25519 user@server"
note = "当有多个密钥对时，手动指定要使用的私钥"

[[options]]
flag = "-L"
name = "本地端口转发"
example = "ssh -L 8080:localhost:80 user@server"
note = "将本地端口映射到远程服务，常用于访问内网服务"

[[options]]
flag = "-R"
name = "远程端口转发"
example = "ssh -R 9090:localhost:3000 user@server"
note = "将远程端口映射到本地服务，可实现内网穿透"

[[options]]
flag = "-N"
name = "不执行远程命令"
example = "ssh -N -L 8080:localhost:80 user@server"
note = "仅建立端口转发隧道，不打开远程 shell"

[[options]]
flag = "-v"
name = "详细调试模式"
example = "ssh -v user@server"
note = "输出详细连接调试信息，排查连接问题时非常有用"

[[options]]
flag = "-X"
name = "启用 X11 转发"
example = "ssh -X user@server"
note = "允许在本地显示远程服务器的图形界面程序"

