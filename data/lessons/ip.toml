[meta]
command = "ip"
full_name = "iproute2"
category = "network"
difficulty = "basic"
importance = "core"

[overview]
summary = "管理网络接口、IP 地址和路由"
explanation = """ip 命令是 Linux 中管理网络配置的核心工具，属于 iproute2 工具集。\
它替代了传统的 ifconfig、route、arp 等命令，功能更强大、输出更结构化。\
ip 命令采用"对象+动作"的语法结构：ip <对象> <动作>。\
常用对象包括：addr（IP 地址）、link（网络接口）、route（路由表）、neigh（ARP 邻居）。\
在现代 Linux 系统中，强烈建议使用 ip 命令而不是已弃用的 ifconfig。\
ip 命令的输出信息更详细，支持 IPv6，并且在所有 Linux 发行版上都预装。"""

[syntax]
basic = "ip [选项] 对象 [命令]"
[[syntax.parts]]
name = "对象"
desc = "操作对象：addr（地址）、link（接口）、route（路由）、neigh（邻居）"
[[syntax.parts]]
name = "命令"
desc = "对象上的操作：show、add、del 等"

[[options]]
flag = "addr"
name = "IP 地址管理"
example = "ip addr show"
note = "查看、添加或删除网络接口的 IP 地址"

[[options]]
flag = "link"
name = "网络接口管理"
example = "ip link show"
note = "查看或修改网络接口的状态"

[[options]]
flag = "route"
name = "路由管理"
example = "ip route show"
note = "查看或修改路由表"

[[options]]
flag = "neigh"
name = "ARP 邻居表"
example = "ip neigh show"
note = "查看 ARP 缓存（局域网中的设备 MAC 地址）"

[[options]]
flag = "-c"
name = "彩色输出"
example = "ip -c addr show"
note = "以彩色高亮显示输出，更易阅读"

[[options]]
flag = "-br"
name = "简洁模式"
example = "ip -br addr show"
note = "以简洁格式显示，一行一个接口"

[[examples]]
level = 1
command = "ip addr show"
summary = "显示所有网络接口的 IP 地址信息"
simulated_output = """1: lo: <LOOPBACK,UP,LOWER_UP> mtu 65536 qdisc noqueue state UNKNOWN group default qlen 1000
    link/loopback 00:00:00:00:00:00 brd 00:00:00:00:00:00
    inet 127.0.0.1/8 scope host lo
       valid_lft forever preferred_lft forever
    inet6 ::1/128 scope host noprefixroute
       valid_lft forever preferred_lft forever
2: ens33: <BROADCAST,MULTICAST,UP,LOWER_UP> mtu 1500 qdisc fq_codel state UP group default qlen 1000
    link/ether 00:0c:29:4a:5b:6c brd ff:ff:ff:ff:ff:ff
    inet 192.168.1.100/24 brd 192.168.1.255 scope global dynamic noprefixroute ens33
       valid_lft 85432sec preferred_lft 85432sec
    inet6 fe80::20c:29ff:fe4a:5b6c/64 scope link
       valid_lft forever preferred_lft forever"""

output_explanation = "输出展示了网络接口、IP 地址、路由或邻居表信息。排障时重点看网卡状态、地址前缀和默认路由是否正确。"
[[examples.token_details]]
token = "addr"
explanation = "命令参数，用于指定要处理的对象或行为细节。"

[[examples.token_details]]
token = "show"
