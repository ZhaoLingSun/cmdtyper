[[gotchas]]
title = "ip 命令 vs ifconfig"
content = """ifconfig 已被弃用，ip 命令是现代替代品：
  ifconfig              →  ip addr show
  ifconfig eth0         →  ip addr show dev eth0
  ifconfig eth0 up      →  ip link set eth0 up
  ifconfig eth0 down    →  ip link set eth0 down
  ifconfig eth0 IP      →  ip addr add IP/24 dev eth0
  route -n              →  ip route show
  arp -a                →  ip neigh show

注意：ip 命令的修改在重启后会失效。
要永久修改网络配置，需要编辑 /etc/netplan/（Ubuntu）
或 /etc/sysconfig/network-scripts/（RHEL/CentOS）。"""

[[gotchas]]
title = "ip addr 的临时性"
content = """使用 ip 命令添加的 IP 地址或路由是临时的，重启后会丢失。
要实现永久配置，不同发行版有不同的方式：

Ubuntu/Debian (Netplan):
  编辑 /etc/netplan/*.yaml 然后执行 sudo netplan apply

RHEL/CentOS:
  编辑 /etc/sysconfig/network-scripts/ifcfg-eth0

Arch Linux:
  使用 systemd-networkd 或 NetworkManager

通用方法：
  使用 nmcli（NetworkManager 的命令行工具）进行永久配置。"""
