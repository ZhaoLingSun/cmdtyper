[meta]
command = "mkdir"
full_name = "Make Directory"
category = "file_ops"
difficulty = "beginner"
importance = "core"

[overview]
summary = "创建新目录"
explanation = """mkdir（make directory）用于创建新的目录。最常用的选项是 -p，它可以一次性创建多级目录结构，且目录已存在时不报错。在编写 Shell 脚本时，mkdir -p 几乎是创建目录的标准写法。-m 选项可以在创建目录的同时指定权限模式，省去了后续再运行 chmod 的步骤。mkdir 是文件系统操作中最基础的命令之一，常与 cd、cp 等命令配合使用。"""

[syntax]
basic = "mkdir [选项] 目录名..."
[[syntax.parts]]
name = "选项"
desc = "控制创建行为的标志，如 -p 创建父目录"
[[syntax.parts]]
name = "目录名"
desc = "要创建的目录路径，支持多个参数，可以包含父路径"

[[options]]
flag = "-p"
name = "创建父目录"
example = "mkdir -p /opt/app/logs"
note = "递归创建所有不存在的父目录，且目录已存在时不报错"

[[options]]
flag = "-m"
name = "设置权限模式"
example = "mkdir -m 700 ~/.secrets"
note = "创建目录的同时设置指定的权限模式"

[[options]]
flag = "-v"
name = "显示详情"
example = "mkdir -pv /opt/app/config"
note = "显示每个被创建的目录路径"

[[examples]]
level = 1
command = "mkdir projects"
summary = "在当前目录创建 projects 目录"
simulated_output = ""

[[examples]]
level = 1
command = "mkdir -p ~/code/python/scripts"
summary = "一次性创建多级目录结构"
simulated_output = ""

[[examples]]
level = 2
command = "mkdir -pv /opt/myapp/logs /opt/myapp/config /opt/myapp/data"
summary = "同时创建三个子目录并显示详情"
simulated_output = """mkdir: created directory '/opt/myapp'
mkdir: created directory '/opt/myapp/logs'
mkdir: created directory '/opt/myapp/config'
mkdir: created directory '/opt/myapp/data'"""

[[examples]]
level = 2
command = "mkdir -m 755 /var/www/newsite"
summary = "创建 Web 目录并设置标准权限"
simulated_output = ""

[[examples]]
level = 3
command = "mkdir -p backups/2024-03-09"
summary = "创建以日期命名的备份目录"
simulated_output = ""

[[gotchas]]
title = "-p 是脚本中的标准写法"
content = """在 Shell 脚本中创建目录时，始终应该使用 mkdir -p，原因有二：1. 如果父目录不存在，-p 会自动创建整个路径链。2. 如果目录已经存在，-p 不会报错（不加 -p 会报 "File exists"）。不加 -p 的 mkdir 在自动化脚本中容易因目录已存在而导致脚本意外终止。"""

[[gotchas]]
title = "花括号展开语法一次创建多个目录"
content = """可以利用 Shell 的花括号展开一次创建多个目录：mkdir -p app/src app/tests app/docs 会创建三个目录。使用 mkdir -p proj/{src,tests,docs} 语法可以更简洁地完成同样的操作。这种技巧在初始化项目目录结构时非常高效。"""
