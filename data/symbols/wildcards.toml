[meta]
id = "wildcards"
topic = "通配符"
description = "学习 Shell 中的通配符（Globbing），掌握文件名模式匹配和花括号展开等高效操作"
difficulty = "beginner"
icon = "✨"

# ─────────────────────────────────────────────
# 1. * 匹配任意字符
# ─────────────────────────────────────────────
[[symbols]]
id = "asterisk"
char_repr = "*"
name = "星号通配符"
summary = "匹配零个或多个任意字符（不匹配以 . 开头的隐藏文件）"
explanation = """星号 * 是最常用的通配符，可以匹配文件名中零个或多个任意字符。

基本规则：
  *.txt       匹配所有以 .txt 结尾的文件
  file*       匹配所有以 file 开头的文件
  *report*    匹配文件名中包含 report 的所有文件

重要特性：
  - * 不会匹配以点号（.）开头的隐藏文件，除非明确写成 .*
  - * 不会匹配路径分隔符 /（在 Bash 的 globstar 模式下 ** 可以匹配多级目录）
  - Shell 在执行命令之前会先展开通配符，命令本身收到的已经是展开后的文件列表

如果没有匹配到任何文件，不同的 Shell 处理方式不同：
  - Bash 默认保留原始的 * 字符串
  - Zsh 默认报错"""

[[symbols.examples]]
command = "ls *.txt"
explanation = "列出当前目录下所有 .txt 文件"
simulated_output = """notes.txt  readme.txt  todo.txt"""

[[symbols.examples]]
command = "rm -i temp_*"
explanation = "删除所有以 temp_ 开头的文件（加 -i 交互确认，防止误删）"
simulated_output = """rm: remove regular file 'temp_data.csv'? y
rm: remove regular file 'temp_output.log'? y
rm: remove regular file 'temp_results.json'? y"""

[[symbols.examples]]
command = "cp /etc/*.conf ~/backup/"
explanation = "将 /etc 目录下所有 .conf 配置文件复制到家目录的 backup 文件夹"
simulated_output = ""

# ─────────────────────────────────────────────
# 2. ? 匹配单个字符
# ─────────────────────────────────────────────
[[symbols]]
id = "question_mark"
char_repr = "?"
name = "问号通配符"
summary = "匹配恰好一个任意字符"
explanation = """问号 ? 匹配恰好一个字符（不能为零个，不能为多个）。

示例模式：
  file?.txt    匹配 file1.txt、fileA.txt，但不匹配 file10.txt
  ???          匹配恰好三个字符的文件名
  report_??.csv  匹配 report_01.csv 等，但不匹配 report_1.csv

? 和 * 可以组合使用：
  ?.txt        匹配单字符名称的 .txt 文件
  *?.log       匹配至少一个字符的 .log 文件（排除 .log 本身）

与 * 一样，? 也不匹配以 . 开头的隐藏文件和路径分隔符 /。"""

[[symbols.examples]]
command = "ls file?.txt"
explanation = "列出文件名为 file 加恰好一个字符再加 .txt 的文件"
simulated_output = """file1.txt  file2.txt  fileA.txt"""

[[symbols.examples]]
command = "ls /dev/sd?"
explanation = "列出所有单字母的 SCSI 磁盘设备（如 sda、sdb 等）"
simulated_output = """/dev/sda  /dev/sdb"""

[[symbols.examples]]
command = "ls image_???.png"
explanation = "列出 image_ 后面恰好跟三个字符的 PNG 文件（如编号 001-999）"
simulated_output = """image_001.png  image_042.png  image_100.png"""

# ─────────────────────────────────────────────
# 3. [] 字符类匹配
# ─────────────────────────────────────────────
[[symbols]]
id = "bracket_class"
char_repr = "[]"
name = "方括号字符类"
summary = "匹配方括号内指定的任意一个字符"
explanation = """方括号 [] 用于匹配其中列出的任意一个字符。

语法与常见模式：
  [abc]       匹配 a、b 或 c 中的任意一个
  [0-9]       匹配任意一个数字（范围表示）
  [a-z]       匹配任意一个小写字母
  [A-Za-z]    匹配任意一个英文字母
  [!abc]      匹配除 a、b、c 以外的任意一个字符（取反）
  [^abc]      同上，^ 和 ! 在方括号内都表示取反

组合示例：
  file[0-9].txt      匹配 file0.txt 到 file9.txt
  log.[!0-9]*        匹配 log. 后面不以数字开头的文件
  [Mm]akefile        匹配 Makefile 或 makefile

注意：方括号内的特殊字符（如 * 和 ?）失去通配含义，被当作普通字符。"""

[[symbols.examples]]
command = "ls file[0-9].txt"
explanation = "列出 file0.txt 到 file9.txt 之间存在的文件"
simulated_output = """file1.txt  file3.txt  file7.txt"""

[[symbols.examples]]
command = "ls [Mm]akefile"
explanation = "同时匹配 Makefile 和 makefile（兼容不同命名习惯）"
simulated_output = """Makefile"""

[[symbols.examples]]
command = "ls *.[ch]"
explanation = "列出所有 C 语言源文件（.c）和头文件（.h）"
simulated_output = """main.c  utils.c  config.h  types.h"""

# ─────────────────────────────────────────────
# 4. {} 花括号展开
# ─────────────────────────────────────────────
[[symbols]]
id = "brace_expansion"
char_repr = "{}"
name = "花括号展开"
summary = "生成由逗号或序列指定的多个字符串，用于批量操作"
explanation = """花括号展开 {} 是 Bash/Zsh 的一项字符串生成功能（注意：不是文件匹配）。
它在通配符展开之前执行，无论对应的文件是否存在都会生成结果。

两种形式：

1. 逗号分隔列表：
   {a,b,c}         → a b c
   file.{txt,md}   → file.txt file.md
   {cat,dog,bird}  → cat dog bird

2. 序列表达式：
   {1..5}          → 1 2 3 4 5
   {a..f}          → a b c d e f
   {01..10}        → 01 02 03 04 05 06 07 08 09 10（带前导零）
   {1..10..2}      → 1 3 5 7 9（指定步长）

花括号可以嵌套，也可以与路径组合：
   /home/{alice,bob}/{docs,pics}
   → /home/alice/docs /home/alice/pics /home/bob/docs /home/bob/pics

关键区别：{} 是字符串生成，不依赖文件是否存在；* 和 ? 是文件匹配，只返回实际存在的文件。"""

[[symbols.examples]]
command = "echo {1..5}"
explanation = "使用序列表达式生成 1 到 5 的数字序列"
simulated_output = "1 2 3 4 5"

[[symbols.examples]]
command = "mkdir -p project/{src,tests,docs}"
explanation = "一次性创建项目的三个子目录：src、tests、docs"
simulated_output = ""

[[symbols.examples]]
command = "cp config.yml{,.bak}"
explanation = "快速备份文件——展开为 cp config.yml config.yml.bak"
simulated_output = ""

# ─────────────────────────────────────────────
# 练习题
# ─────────────────────────────────────────────
[[exercises]]
prompt = "列出当前目录下所有 .log 文件"
answers = [
    "ls *.log",
    "ls -la *.log",
    "ls -l *.log",
]

[[exercises]]
prompt = "删除所有以 backup_ 开头、以 .tar.gz 结尾的文件"
answers = [
    "rm backup_*.tar.gz",
    "rm -f backup_*.tar.gz",
    "rm -i backup_*.tar.gz",
]

[[exercises]]
prompt = "一次性创建 chapter01 到 chapter05 五个目录"
answers = [
    "mkdir chapter{01..05}",
    "mkdir -p chapter{01..05}",
    "mkdir chapter0{1..5}",
]

[[exercises]]
prompt = "列出 data1.csv 到 data9.csv 中存在的文件"
answers = [
    "ls data[1-9].csv",
    "ls data?.csv",
    "ls data{1..9}.csv",
]
