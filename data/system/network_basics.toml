[meta]
id = "network_basics"
topic = "网络基础"
description = "理解 Linux 网络栈：IP 地址、DNS 解析、端口与服务、防火墙、网络诊断工具"
difficulty = "basic"
icon = "🌐"

overview = """
┌─────────────────────────────────────────────────────┐
│              Linux 网络协议栈概览                      │
│                                                     │
│  ┌─────────────────────────────────────────────┐    │
│  │  应用层 (Application Layer)                  │    │
│  │  HTTP, FTP, SSH, DNS, SMTP ...              │    │
│  ├─────────────────────────────────────────────┤    │
│  │  传输层 (Transport Layer)                    │    │
│  │  TCP (可靠连接) / UDP (无连接)                │    │
│  ├─────────────────────────────────────────────┤    │
│  │  网络层 (Network Layer)                      │    │
│  │  IP 协议 — 路由、寻址                         │    │
│  ├─────────────────────────────────────────────┤    │
│  │  链路层 (Link Layer)                         │    │
│  │  以太网 / Wi-Fi — MAC 地址                    │    │
│  └─────────────────────────────────────────────┘    │
│                                                     │
│  常见接口名:                                         │
│    eth0 / ens33  — 有线网卡                          │
│    wlan0         — 无线网卡                          │
│    lo            — 本地回环 (127.0.0.1)              │
│    docker0       — Docker 虚拟网桥                   │
│                                                     │
│  关键概念:                                           │
│    IP 地址  — 网络中设备的唯一标识                     │
│    子网掩码  — 划分网络与主机部分                      │
│    网关     — 连接不同网络的出口                      │
│    DNS      — 域名 → IP 的翻译服务                   │
│    端口     — 区分同一 IP 上的不同服务                 │
└─────────────────────────────────────────────────────┘"""

# ============================================================
# Section 1: IP 地址与网卡
# ============================================================
[[sections]]
id = "ip-address"
title = "IP 地址与网卡"
description = """IP 地址是网络中设备的唯一标识符。Linux 使用 iproute2 工具集（ip 命令）来管理网络接口和地址。

IPv4 地址格式：A.B.C.D（如 192.168.1.100）
IPv6 地址格式：用冒号分隔的十六进制数（如 fe80::1）

每台 Linux 机器至少有一个 lo（回环）接口，地址为 127.0.0.1，用于本机内部通信。
物理网卡通常命名为 eth0、ens33（有线）或 wlan0（无线）。"""

