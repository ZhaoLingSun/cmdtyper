# ============================================================
# Section 2: DNS 解析
# ============================================================
[[sections]]
id = "dns"
title = "DNS 解析"
description = """DNS（Domain Name System）将人类可读的域名转换为 IP 地址。

DNS 解析过程：
  浏览器缓存 → 系统缓存 → /etc/hosts → 本地 DNS 服务器 → 根域名服务器 → 顶级域服务器 → 权威服务器

Linux 中的 DNS 配置：
  /etc/resolv.conf — 指定 DNS 服务器地址
  /etc/hosts       — 本地静态域名解析
  /etc/nsswitch.conf — 名称解析顺序配置

常用 DNS 工具：dig（推荐）、nslookup（传统）、host（简洁）"""

[[sections.commands]]
command = "dig example.com"
summary = "查询域名的 DNS 记录（详细输出）"
