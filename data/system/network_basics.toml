# ============================================================
# Section 4: 防火墙 (ufw)
# ============================================================
[[sections]]
id = "firewall-ufw"
title = "防火墙 (ufw)"
description = """UFW（Uncomplicated Firewall）是 Ubuntu/Debian 系统默认的防火墙管理工具，
它是 iptables 的简化前端，使防火墙配置更加直观。

防火墙核心概念：
  - 默认策略：允许所有出站（outgoing），拒绝所有入站（incoming）
  - 规则按顺序匹配，第一条匹配的规则生效
  - 常见操作：允许/拒绝 特定端口或服务

注意：修改防火墙规则前，务必确保 SSH（22端口）已允许，
否则远程连接将被中断！"""

[[sections.commands]]
command = "sudo ufw status verbose"
summary = "查看防火墙状态和规则（详细模式）"
simulated_output = """Status: active
Logging: on (low)
Default: deny (incoming), allow (outgoing), disabled (routed)
New profiles: skip

To                         Action      From
--                         ------      ----
22/tcp                     ALLOW IN    Anywhere
80/tcp                     ALLOW IN    Anywhere
443/tcp                    ALLOW IN    Anywhere
22/tcp (v6)                ALLOW IN    Anywhere (v6)
80/tcp (v6)                ALLOW IN    Anywhere (v6)
443/tcp (v6)               ALLOW IN    Anywhere (v6)"""

[[sections.commands]]
command = "sudo ufw allow 22/tcp"
summary = "允许 SSH 端口的 TCP 入站连接"
simulated_output = """Rule added
Rule added (v6)"""

[[sections.commands]]
command = "sudo ufw allow from 192.168.1.0/24 to any port 3306"
summary = "仅允许局域网访问 MySQL 端口"
simulated_output = """Rule added"""

[[sections.commands]]
command = "sudo ufw deny 23"
summary = "拒绝 Telnet 端口的入站连接"
simulated_output = """Rule added
Rule added (v6)"""

[[sections.commands]]
command = "sudo ufw status numbered"
summary = "显示带编号的防火墙规则（用于删除规则）"
simulated_output = """Status: active

     To                         Action      From
     --                         ------      ----
[ 1] 22/tcp                     ALLOW IN    Anywhere
