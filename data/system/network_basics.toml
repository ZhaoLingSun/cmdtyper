# ============================================================
# Section 5: 网络诊断 (ping/traceroute/ss/netstat)
# ============================================================
[[sections]]
id = "network-diagnostics"
title = "网络诊断"
description = """网络出问题时，需要系统性地排查。常用诊断思路：

1. 本机网络是否正常？     → ip addr, ping 127.0.0.1
2. 能否到达网关？         → ping 192.168.1.1
3. 能否到达外网？         → ping 8.8.8.8
4. DNS 是否正常？         → ping google.com, dig google.com
5. 路径上哪一跳出问题？    → traceroute
6. 特定端口是否可达？      → curl, telnet, nc

这套排查流程从底层到应用层逐步验证，能快速定位问题所在。"""

