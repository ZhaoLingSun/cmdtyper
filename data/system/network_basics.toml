# ============================================================
# Section 3: 端口与服务
# ============================================================
[[sections]]
id = "ports-services"
title = "端口与服务"
description = """端口号（0-65535）用来区分同一 IP 地址上运行的不同服务。

端口范围：
  0-1023     — 知名端口（Well-known），需要 root 权限绑定
  1024-49151 — 注册端口（Registered），用于常见应用
  49152-65535 — 动态/临时端口（Ephemeral）

常见服务端口：
  22   — SSH       443  — HTTPS
  80   — HTTP      3306 — MySQL
  25   — SMTP      5432 — PostgreSQL
  53   — DNS       6379 — Redis
  110  — POP3      8080 — HTTP 备用

ss 命令（替代 netstat）用于查看当前监听的端口和连接。"""

[[sections.commands]]
command = "ss -tulnp"
