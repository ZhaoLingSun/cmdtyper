# ============================================================
# Section 3: /usr 用户程序目录
# ============================================================
[[sections]]
id = "usr"
title = "/usr 用户程序目录"
description = """/usr 是 Linux 中最大的目录之一，包含用户级别的程序、库和文档。

usr 最初是"user"的缩写，现在通常理解为"Unix System Resources"。

/usr 内部是一个二级层次结构，镜像了根目录的组织方式：
  /usr/bin/    — 大部分用户命令（非启动必需的）
  /usr/sbin/   — 非必需的系统管理命令
  /usr/lib/    — 库文件
  /usr/local/  — 本地编译安装的软件（不受包管理器管理）
  /usr/share/  — 架构无关的共享数据（文档、图标、语言文件）
  /usr/include/ — C/C++ 头文件
  /usr/src/    — 内核源代码

在现代 Linux 发行版中，/bin 和 /sbin 通常是指向 /usr/bin 和 /usr/sbin 的符号链接。"""

[[sections.commands]]
command = "ls /usr/"
summary = "列出 /usr 目录下的子目录"
simulated_output = """bin
games
include
lib
lib32
lib64
libexec
libx32
local
sbin
share
src"""

[[sections.commands]]
command = "ls /usr/bin/ | wc -l"
summary = "统计 /usr/bin 下的命令数量"
simulated_output = """2847"""

[[sections.commands]]
command = "ls /usr/share/doc/ | head -10"
summary = "列出 /usr/share/doc 下前 10 个软件包的文档目录"
simulated_output = """adduser
apt
base-files
base-passwd
bash
bsdutils
ca-certificates
coreutils
cpio
cron"""

# ============================================================
# Section 4: /home 用户家目录
# ============================================================
[[sections]]
id = "home"
title = "/home 用户家目录"
description = """/home 是普通用户个人文件的存放地。每个用户在 /home 下有一个与用户名同名的子目录。

用户家目录结构：
  /home/username/
  ├── Desktop/      桌面文件
  ├── Documents/    文档
  ├── Downloads/    下载
  ├── .bashrc       Bash 配置
  ├── .ssh/         SSH 密钥
  ├── .config/      应用配置
  └── .local/       用户本地数据

波浪号 ~ 是当前用户家目录的快捷方式。
例如 ~ 对于用户 alice 等于 /home/alice。

注意：root 用户的家目录不在 /home 下，而是 /root。"""

[[sections.commands]]
command = "ls -la /home/"
summary = "查看 /home 目录下的所有用户家目录"
