# ============================================================
# Section 6: /dev 设备文件目录
# ============================================================
[[sections]]
id = "dev"
title = "/dev 设备文件目录"
description = """/dev 包含设备文件（device files），是 Linux "一切皆文件"哲学的核心体现。

设备文件类型：
  块设备（b）— 按块读写，如硬盘 /dev/sda
  字符设备（c）— 按字符读写，如终端 /dev/tty

常见设备文件：
  /dev/sda      — 第一块 SCSI/SATA 硬盘
  /dev/sda1     — 第一块硬盘的第一个分区
  /dev/nvme0n1  — 第一块 NVMe 固态硬盘
  /dev/null     — 黑洞，丢弃所有写入的数据
  /dev/zero     — 无限产生空字节（\\0）
  /dev/random   — 生成随机数据（加密级别）
  /dev/urandom  — 生成伪随机数据（非阻塞）
  /dev/tty      — 当前终端
  /dev/loop0    — 回环设备（挂载镜像文件用）

/dev 由 udev 守护进程动态管理，设备插入时自动创建对应文件。"""

[[sections.commands]]
command = "ls /dev/sd*"
summary = "列出所有 SCSI/SATA 磁盘设备文件"
simulated_output = """/dev/sda
/dev/sda1
/dev/sda2
/dev/sda3
/dev/sdb
/dev/sdb1"""

[[sections.commands]]
command = "ls -la /dev/null /dev/zero /dev/random"
summary = "查看三个常用特殊设备文件的详细信息"
simulated_output = """crw-rw-rw- 1 root root 1, 3 Mar  9 00:00 /dev/null
crw-rw-rw- 1 root root 1, 8 Mar  9 00:00 /dev/random
crw-rw-rw- 1 root root 1, 5 Mar  9 00:00 /dev/zero"""

# ============================================================
# Section 7: /proc 进程信息伪文件系统
# ============================================================
[[sections]]
id = "proc"
title = "/proc 进程信息伪文件系统"
description = """/proc 是一个虚拟文件系统（procfs），不占用磁盘空间，由内核在内存中动态生成。

它提供了一个查看内核和进程状态的窗口：
  /proc/[PID]/    — 每个运行中的进程有一个以 PID 命名的子目录
  /proc/cpuinfo   — CPU 详细信息
  /proc/meminfo   — 内存使用情况
  /proc/version   — 内核版本信息
  /proc/uptime    — 系统运行时间
  /proc/loadavg   — 系统负载
  /proc/mounts    — 已挂载的文件系统
  /proc/net/      — 网络相关统计

进程子目录中的常用文件：
  /proc/[PID]/cmdline  — 进程启动命令
  /proc/[PID]/status   — 进程状态
  /proc/[PID]/fd/      — 进程打开的文件描述符

/proc 是排查系统问题和监控性能的重要信息源。"""

[[sections.commands]]
command = "ls /proc/ | head -20"
summary = "列出 /proc 目录下的前 20 项（数字为进程 PID）"
simulated_output = """1
