[meta]
id = "directory_structure"
topic = "Linux 目录结构"
description = "理解 Linux 文件系统层次标准（FHS）：根目录下各子目录的用途、系统配置、日志、设备文件与伪文件系统"
difficulty = "beginner"
icon = "🏗️"

overview = """
┌─────────────────────────────────────────────────────────┐
│            Linux 文件系统层次结构 (FHS)                    │
│                                                         │
│  /                        ← 根目录，一切的起点             │
│  ├── bin/     基本用户命令（ls, cp, cat ...）              │
│  ├── boot/    启动文件（内核 vmlinuz, 引导 grub）          │
│  ├── dev/     设备文件（硬盘 sda, 特殊设备 null）          │
│  ├── etc/     系统配置文件（ssh, nginx, passwd ...）       │
│  ├── home/    普通用户的家目录                             │
│  ├── lib/     共享库文件（.so 动态链接库）                  │
│  ├── media/   可移动设备挂载点（U盘, 光盘）                │
│  ├── mnt/     临时手动挂载点                               │
│  ├── opt/     第三方可选软件（/opt/google/chrome）          │
│  ├── proc/    进程信息伪文件系统（虚拟，内核动态生成）       │
│  ├── root/    root 用户的家目录                            │
│  ├── run/     运行时数据（PID 文件, 套接字）                │
│  ├── sbin/    系统管理命令（fdisk, iptables, reboot）      │
│  ├── srv/     服务数据（Web 站点, FTP 文件）                │
│  ├── sys/     系统硬件信息伪文件系统（虚拟）                │
│  ├── tmp/     临时文件（重启可能清除）                      │
│  ├── usr/     用户程序和数据（二级层次结构）                 │
│  │   ├── bin/     大多数用户命令                            │
│  │   ├── lib/     库文件                                   │
│  │   ├── local/   本地编译安装的软件                        │
│  │   └── share/   架构无关的共享数据                        │
│  └── var/     可变数据（日志, 缓存, 邮件）                  │
│      ├── log/     系统日志                                 │
│      ├── cache/   应用缓存                                 │
│      └── tmp/     持久临时文件                              │
│                                                         │
│  记忆口诀：                                                │
│    etc 配置 var 日志，home 用户 tmp 临时                    │
│    proc sys 虚拟看，dev 设备 boot 启动                     │
│    usr 程序 bin 命令，lib 库文件 opt 可选                   │
└─────────────────────────────────────────────────────────┘"""

# ============================================================
# Section 1: /etc 系统配置目录
# ============================================================
[[sections]]
id = "etc"
title = "/etc 系统配置目录"
description = """/etc 是 Linux 中最重要的目录之一，存放几乎所有系统和服务的配置文件。

名称来源：早期 Unix 中 etc 是"et cetera"（其他）的缩写，后来演变为"Editable Text Configuration"的含义。

常见子目录和文件：
  /etc/passwd      — 用户账户信息
  /etc/shadow      — 用户密码（加密存储）
  /etc/group       — 用户组信息
  /etc/fstab       — 文件系统挂载表
  /etc/hostname    — 主机名
  /etc/hosts       — 本地 DNS 映射
  /etc/ssh/        — SSH 服务配置
  /etc/nginx/      — Nginx 配置
  /etc/systemd/    — Systemd 单元文件

修改 /etc 下的文件通常需要 root 权限（sudo）。"""

[[sections.commands]]
command = "ls /etc/ | head -20"
summary = "列出 /etc 目录下的前 20 个文件和子目录"
simulated_output = """adduser.conf
alternatives
apache2
apparmor
apparmor.d
apt
