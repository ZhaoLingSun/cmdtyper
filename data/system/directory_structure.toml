# ============================================================
# Section 2: /var 可变数据目录
# ============================================================
[[sections]]
id = "var"
title = "/var 可变数据目录"
description = """/var 存放运行时会不断变化的数据，如日志、缓存、邮件队列、数据库文件等。

var 是"variable"（可变的）的缩写。与 /etc（配置基本不变）不同，/var 下的内容随系统运行持续增长和变化。

常见子目录：
  /var/log/    — 系统和应用日志（syslog, auth.log, nginx/）
  /var/cache/  — 应用程序缓存（apt, man）
  /var/lib/    — 应用程序状态数据（dpkg, mysql, docker）
  /var/mail/   — 用户邮件
  /var/spool/  — 排队等待处理的数据（打印队列, cron）
  /var/tmp/    — 重启后保留的临时文件
  /var/run/    — 运行时数据（通常是 /run 的符号链接）

运维中最常关注的是 /var/log/，磁盘空间不足时 /var 往往是第一个检查的目录。"""

[[sections.commands]]
command = "ls /var/"
summary = "列出 /var 目录下的所有子目录"
simulated_output = """backups
cache
crash
lib
local
lock
log
mail
opt
run
snap
spool
tmp"""

[[sections.commands]]
command = "du -sh /var/log/* | sort -rh | head -5"
summary = "按大小排序显示 /var/log 下最大的 5 个日志文件或目录"
