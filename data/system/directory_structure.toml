# ============================================================
# Section 8: /sys 系统信息伪文件系统
# ============================================================
[[sections]]
id = "sys"
title = "/sys 系统信息伪文件系统"
description = """/sys 是另一个虚拟文件系统（sysfs），提供内核对象、设备驱动和硬件信息的结构化视图。

与 /proc 的区别：
  /proc — 主要关注进程和内核运行时状态
  /sys  — 主要关注设备、驱动和内核子系统的层次结构

常见子目录：
  /sys/block/       — 块设备信息（磁盘）
  /sys/bus/         — 总线类型（pci, usb, scsi）
  /sys/class/       — 设备分类（net, input, tty）
  /sys/devices/     — 所有设备的统一层次
  /sys/firmware/    — 固件信息（ACPI, EFI）
  /sys/fs/          — 文件系统相关参数
  /sys/kernel/      — 内核参数
  /sys/module/      — 已加载的内核模块
  /sys/power/       — 电源管理

/sys 中的文件可以读取硬件信息，某些文件也支持写入以调整内核参数。"""

[[sections.commands]]
command = "ls /sys/"
summary = "列出 /sys 目录下的所有子目录"
simulated_output = """block
bus
class
dev
devices
firmware
fs
hypervisor
kernel
module
power"""

[[sections.commands]]
command = "cat /sys/class/net/ens33/address"
summary = "读取 ens33 网卡的 MAC 地址"
simulated_output = """00:0c:29:4a:5b:6c"""
