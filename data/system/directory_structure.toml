# ============================================================
# Section 5: /tmp 临时文件目录
# ============================================================
[[sections]]
id = "tmp"
title = "/tmp 临时文件目录"
description = """/tmp 用于存放临时文件，所有用户都可以在此读写。

特点：
  - 任何用户均可创建文件
  - 设置了 sticky bit（粘滞位），用户只能删除自己的文件
  - 系统重启后内容通常会被清除
  - 部分发行版使用 tmpfs（内存文件系统），写入速度极快
  - 10 天未访问的文件会被 systemd-tmpfiles 自动清理

安全提示：
  /tmp 是公共目录，不要在此存放敏感数据。
  sticky bit 权限标志为 t（如 drwxrwxrwt），防止用户删除他人文件。"""

[[sections.commands]]
command = "ls -la /tmp/"
summary = "列出 /tmp 目录下的所有临时文件"
