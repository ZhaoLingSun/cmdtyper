# ============================================================
# Section 3: Pacman 包管理（Arch Linux）
# ============================================================
[[sections]]
id = "pacman"
title = "Pacman 包管理（Arch Linux）"
description = """Pacman 是 Arch Linux 及其衍生发行版（Manjaro 等）的包管理工具。
它以简洁高效著称，使用单字母选项组合来执行不同操作。

核心选项说明：
  -S  — Sync（同步/安装）    pacman -S nginx
  -R  — Remove（卸载）       pacman -R nginx
  -Q  — Query（查询本地）     pacman -Q
  -Ss — 在仓库中搜索包
  -Qi — 查询已安装包的详细信息
  -Sy — 同步包数据库
  -Syu— 系统完整升级

软件源配置：
  /etc/pacman.conf       — 主配置文件
  /etc/pacman.d/mirrorlist — 镜像源列表

Arch 遵循滚动更新模型，建议经常执行 pacman -Syu 保持系统最新。"""

