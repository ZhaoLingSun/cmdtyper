[meta]
id = "package_management"
topic = "软件包管理"
description = "掌握 Linux 软件包管理：apt（Debian/Ubuntu）、yum/dnf（RHEL/CentOS）、pacman（Arch）"
difficulty = "basic"
icon = "📦"

overview = """
┌─────────────────────────────────────────────────┐
│           Linux 软件包管理体系                     │
│                                                 │
│  ┌─────────────┐  ┌─────────────┐  ┌─────────┐ │
│  │ Debian/Ubuntu│  │ RHEL/CentOS │  │  Arch   │ │
│  │   apt/dpkg   │  │  yum/dnf    │  │ pacman  │ │
│  │   .deb 包    │  │  .rpm 包    │  │ .pkg    │ │
│  └─────────────┘  └─────────────┘  └─────────┘ │
│         │                │               │      │
│     sources.list    .repo files     mirrorlist  │
│         │                │               │      │
│     ┌────────────────────────────────────┐      │
│     │        软件仓库 (Repository)         │      │
│     │     镜像源 → 下载 → 验证 → 安装      │      │
│     └────────────────────────────────────┘      │
└─────────────────────────────────────────────────┘"""

# ============================================================
# Section 1: APT 包管理（Debian/Ubuntu）
# ============================================================
[[sections]]
id = "apt"
title = "APT 包管理（Debian/Ubuntu）"
description = """APT（Advanced Package Tool）是 Debian 及其衍生发行版（Ubuntu、Linux Mint 等）的包管理工具。
它是日常 Linux 使用中最常接触的命令之一。

APT 工具链：
  apt       — 高级包管理前端（推荐日常使用）
  apt-get   — 传统包管理命令（脚本中常用）
  apt-cache — 包信息查询工具
  dpkg      — 底层 .deb 包管理工具

软件源配置文件：
  /etc/apt/sources.list           — 主软件源列表
  /etc/apt/sources.list.d/*.list  — 第三方软件源

工作流程：apt update（更新索引）→ apt install（安装）→ apt upgrade（升级）"""

