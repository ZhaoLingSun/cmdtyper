# ============================================================
# Section 4: 常见包管理任务
# ============================================================
[[sections]]
id = "common-tasks"
title = "常见包管理任务"
description = """不同发行版的包管理命令虽然语法不同，但核心操作是一致的。
掌握跨发行版的对照关系，可以在不同系统间快速切换。

常见操作对照表：
  ┌──────────────┬──────────────────┬──────────────────┬────────────────┐
  │    操作       │  apt (Debian)    │  yum/dnf (RHEL)  │ pacman (Arch)  │
  ├──────────────┼──────────────────┼──────────────────┼────────────────┤
  │ 更新索引      │ apt update       │ yum makecache    │ pacman -Sy     │
  │ 安装软件      │ apt install pkg  │ yum install pkg  │ pacman -S pkg  │
  │ 卸载软件      │ apt remove pkg   │ yum remove pkg   │ pacman -R pkg  │
  │ 搜索软件      │ apt search pkg   │ yum search pkg   │ pacman -Ss pkg │
  │ 查看信息      │ apt show pkg     │ yum info pkg     │ pacman -Qi pkg │
  │ 系统升级      │ apt upgrade      │ yum update       │ pacman -Syu    │
  │ 列出已安装    │ apt list         │ yum list inst.   │ pacman -Q      │
  │ 清理缓存      │ apt autoclean    │ yum clean all    │ pacman -Sc     │
  └──────────────┴──────────────────┴──────────────────┴────────────────┘

以下示例基于 Debian/Ubuntu 系统演示一些常用的包管理辅助操作。"""

[[sections.commands]]
command = "which nginx"
summary = "查找已安装命令的可执行文件路径"
simulated_output = """/usr/sbin/nginx"""

[[sections.commands]]
command = "dpkg -L nginx | head -10"
summary = "列出某个已安装包包含的所有文件（前 10 条）"
