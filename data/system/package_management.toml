# ============================================================
# Section 2: YUM/DNF 包管理（RHEL/CentOS/Fedora）
# ============================================================
[[sections]]
id = "yum-dnf"
title = "YUM/DNF 包管理（RHEL/CentOS/Fedora）"
description = """YUM（Yellowdog Updater Modified）和 DNF（Dandified YUM）是 Red Hat 系发行版的包管理工具。
DNF 是 YUM 的下一代替代品，在 Fedora 22+ 和 RHEL 8+ 中已成为默认工具。

工具关系：
  yum  — 传统包管理工具（RHEL 7 / CentOS 7）
  dnf  — 新一代包管理工具（RHEL 8+ / Fedora 22+）
  rpm  — 底层 .rpm 包管理工具

软件源配置文件：
  /etc/yum.repos.d/*.repo — 仓库配置目录

注意：在 RHEL 8+ 中，yum 命令实际上是 dnf 的软链接，两者用法基本一致。"""

