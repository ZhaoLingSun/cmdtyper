[[sections.commands]]
command = "kill 1234"
summary = "向 PID 1234 发送 SIGTERM 信号（请求正常退出）"
simulated_output = """"""

[[sections.commands]]
command = "kill -9 5678"
summary = "向 PID 5678 发送 SIGKILL 信号（强制终止）"
simulated_output = """"""

