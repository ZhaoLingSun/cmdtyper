summary = "终止命令行匹配 \"python script.py\" 的所有进程"
simulated_output = """"""

# ============================================================
# Section 3: 作业控制
# ============================================================
[[sections]]
id = "job-control"
title = "作业控制"
description = """作业控制（Job Control）允许你在同一终端中管理多个进程，
在前台和后台之间切换任务。

核心操作：
  Ctrl+Z  — 暂停当前前台进程（发送 SIGTSTP）
  jobs    — 查看当前终端的后台作业列表
  bg %N   — 将作业 N 在后台继续运行
  fg %N   — 将作业 N 调到前台运行
  cmd &   — 直接在后台启动命令

nohup 命令让进程忽略 SIGHUP 信号，即使终端关闭进程也不会退出。
配合 & 使用，可以让程序在退出终端后继续运行。

使用场景：在 SSH 远程连接中运行长时间任务时，
用 nohup 或 screen/tmux 确保任务不会因断开连接而中止。"""

[[sections.commands]]
command = "jobs"
summary = "显示当前终端的后台作业列表"
simulated_output = """[1]+  Stopped                 vim config.yaml
[2]   Running                 ./build.sh &
[3]-  Running                 tail -f /var/log/syslog &"""

[[sections.commands]]
command = "bg %1"
summary = "将作业 1 在后台继续运行"
simulated_output = """[1]+ vim config.yaml &"""

[[sections.commands]]
command = "fg %1"
summary = "将作业 1 调到前台运行"
simulated_output = """vim config.yaml"""

[[sections.commands]]
command = "nohup ./server.sh &"
summary = "在后台启动 server.sh，忽略挂断信号（终端关闭后继续运行）"
simulated_output = """[1] 28456
nohup: ignoring input and appending output to 'nohup.out'"""

# ============================================================
# Section 4: Systemd 服务单元
# ============================================================
[[sections]]
id = "systemd-units"
title = "Systemd 服务单元"
description = """systemd 是现代 Linux 发行版的初始化系统和服务管理器（PID 1）。
它使用"单元（Unit）"来管理系统资源。

常见单元类型：
  .service — 系统服务（如 nginx、sshd、mysql）
  .timer   — 定时任务（替代 cron）
  .socket  — 套接字激活（按需启动服务）
  .target  — 单元组（类似传统的运行级别）
  .mount   — 文件系统挂载点
  .path    — 文件路径监控

服务管理常用操作：
  start    — 立即启动服务
  stop     — 立即停止服务
  restart  — 重启服务（先停后启）
  reload   — 重新加载配置（不中断服务）
  enable   — 设为开机自启
  disable  — 取消开机自启
  status   — 查看服务当前状态"""

[[sections.commands]]
