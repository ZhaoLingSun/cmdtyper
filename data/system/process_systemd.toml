# ============================================================
# Section 2: 信号与进程控制
# ============================================================
[[sections]]
id = "process-signals"
title = "信号与进程控制"
description = """信号（Signal）是 Linux 中进程间通信的一种机制，用于通知进程发生了某个事件。

常用信号：
  SIGHUP  (1)  — 挂起信号，终端关闭时发送；守护进程通常用它来重新加载配置
  SIGINT  (2)  — 中断信号，Ctrl+C 发送；请求进程正常终止
  SIGKILL (9)  — 强制终止，无法被捕获或忽略；内核直接杀死进程
  SIGTERM (15) — 终止信号，kill 命令默认发送；允许进程优雅退出（清理资源）
  SIGSTOP (19) — 暂停进程，无法被捕获；Ctrl+Z 发送的是 SIGTSTP(20)
  SIGCONT (18) — 恢复被暂停的进程

最佳实践：先用 SIGTERM (kill PID) 请求进程正常退出，
只在进程无响应时才用 SIGKILL (kill -9 PID) 强制终止。"""

[[sections.commands]]
command = "kill -l"
summary = "列出所有可用的信号名称和编号"
simulated_output = """ 1) SIGHUP	 2) SIGINT	 3) SIGQUIT	 4) SIGILL	 5) SIGTRAP
