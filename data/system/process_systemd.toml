[meta]
id = "process_systemd"
topic = "进程管理与 Systemd"
description = "理解 Linux 进程生命周期、进程状态、信号机制，以及 systemd 服务管理和日志查看"
difficulty = "advanced"
icon = "⚙️"

overview = """
  创建 (fork/exec)
       │
       ▼
  ┌─────────┐    CPU 调度     ┌──────────┐
  │  就绪 R  │ ──────────────→│  运行 R   │
  │ (Ready)  │←───────────────│(Running)  │
  └─────────┘   时间片用完    └──────────┘
       ▲                           │
       │                     ┌─────┴─────┐
   事件完成                  │            │
       │                  等待 I/O     exit()
  ┌─────────┐              │            │
  │  睡眠 S  │←────────────┘    ┌──────────┐
  │(Sleeping)│                  │  僵尸 Z   │
  └─────────┘                  │ (Zombie)  │
                               └──────────┘

  进程状态说明:
    R (Running/Runnable) — 正在运行或在运行队列中等待
    S (Sleeping)         — 可中断睡眠，等待事件完成
    D (Disk Sleep)       — 不可中断睡眠，通常等待 I/O
    Z (Zombie)           — 已终止但父进程尚未回收
    T (Stopped)          — 被信号停止（如 Ctrl+Z）"""

# ============================================================
# Section 1: 进程基础
# ============================================================
[[sections]]
id = "process-basics"
title = "进程基础"
description = """每个运行中的程序都是一个进程（Process）。Linux 内核为每个进程分配唯一的进程 ID（PID）。

关键概念：
  PID  — 进程标识符，系统中唯一
  PPID — 父进程 ID，表示由哪个进程创建
  UID  — 运行该进程的用户 ID
  进程树 — 所有进程以 init/systemd（PID=1）为根，形成树形结构

进程创建方式：
  fork()  — 创建当前进程的副本（子进程）
  exec()  — 用新程序替换当前进程的内存映像
  通常 fork + exec 配合使用来启动新程序

ps 命令用于查看当前系统中的进程快照，pstree 以树形展示进程间的父子关系。"""

