# ============================================================
# Section 5: Journalctl 日志查看
# ============================================================
[[sections]]
id = "journalctl"
title = "Journalctl 日志查看"
description = """journalctl 是 systemd 自带的日志查看工具，用于检索和显示 systemd-journald 收集的日志。

与传统的 /var/log 日志文件相比，journalctl 的优势：
  - 结构化日志，支持多维度过滤（服务、优先级、时间范围等）
  - 自动轮转和压缩，磁盘空间可控
  - 关联进程、服务单元等元数据，方便排查问题

日志优先级（从高到低）：
  0 emerg   — 系统不可用
  1 alert   — 必须立即处理
  2 crit    — 严重错误
  3 err     — 一般错误
  4 warning — 警告信息
  5 notice  — 正常但值得注意
  6 info    — 一般信息
  7 debug   — 调试信息"""

