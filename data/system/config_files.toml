devpts on /dev/pts type devpts (rw,nosuid,noexec,relatime,gid=5,mode=620,ptmxmode=000)
tmpfs on /run type tmpfs (rw,nosuid,nodev,noexec,relatime,size=401260k,mode=755)
/dev/sda2 on / type ext4 (rw,relatime,errors=remount-ro)
/dev/sda1 on /boot type ext4 (rw,relatime)
tmpfs on /tmp type tmpfs (rw,noatime)
tmpfs on /dev/shm type tmpfs (rw,nosuid,nodev)
tmpfs on /run/lock type tmpfs (rw,nosuid,nodev,noexec,relatime,size=5120k)"""

[[sections.commands]]
command = "lsblk"
summary = "以树状结构显示所有块设备及其挂载点"
simulated_output = """NAME   MAJ:MIN RM   SIZE RO TYPE MOUNTPOINTS
sda      8:0    0    40G  0 disk
├─sda1   8:1    0   512M  0 part /boot
├─sda2   8:2    0    35G  0 part /
└─sda3   8:3    0   4.5G  0 part [SWAP]
sdb      8:16   0   100G  0 disk
└─sdb1   8:17   0   100G  0 part
sr0     11:0    1  1024M  0 rom"""

[[sections.config_files]]
id = "fstab-file"
path = "/etc/fstab"
name = "文件系统挂载表"
description = "定义系统启动时自动挂载的磁盘分区、交换空间和网络文件系统"
sample_content = """# /etc/fstab: static file system information.
#
# <file system>                            <mount point>  <type>  <options>         <dump>  <pass>
UUID=a1b2c3d4-e5f6-7890-abcd-ef1234567890 /              ext4    errors=remount-ro  0       1
UUID=b2c3d4e5-f6a7-8901-bcde-f12345678901 /boot          ext4    defaults           0       2
UUID=c3d4e5f6-a7b8-9012-cdef-123456789012 none           swap    sw                 0       0
tmpfs                                      /tmp           tmpfs   defaults,noatime   0       0"""

[[sections.config_files.lessons]]
title = "添加新磁盘挂载"
before = """tmpfs                                      /tmp           tmpfs   defaults,noatime   0       0"""
after = """tmpfs                                      /tmp           tmpfs   defaults,noatime   0       0
UUID=d4e5f6a7-b8c9-0123-defa-234567890123 /data          ext4    defaults,noatime   0       2"""
explanation = """添加新磁盘到系统的步骤：
  1. 使用 lsblk 或 fdisk -l 确认新磁盘设备名（如 /dev/sdb1）
  2. 使用 blkid /dev/sdb1 获取 UUID
  3. 创建挂载点目录：sudo mkdir -p /data
  4. 在 fstab 中添加条目
  5. 执行 sudo mount -a 测试挂载

各字段含义：
  UUID=...    — 使用 UUID 比设备名更可靠（磁盘顺序可能变化）
  /data       — 挂载到 /data 目录
  ext4        — 文件系统类型
  defaults    — 默认选项（rw,suid,dev,exec,auto,nouser,async）
  noatime     — 不更新访问时间戳（提高性能）
  0           — 不使用 dump 备份
  2           — fsck 检查顺序为 2（非根分区）"""
practice_command = "sudo blkid /dev/sdb1 && sudo mkdir -p /data && sudo mount -a"

[[sections.config_files.lessons]]
title = "添加 NFS 网络挂载"
before = """tmpfs                                      /tmp           tmpfs   defaults,noatime   0       0"""
after = """tmpfs                                      /tmp           tmpfs   defaults,noatime   0       0
192.168.1.10:/shared                       /mnt/nfs       nfs     defaults,_netdev   0       0"""
explanation = """NFS（Network File System）允许通过网络挂载远程目录。

各字段含义：
  192.168.1.10:/shared — NFS 服务器 IP 和共享目录
  /mnt/nfs             — 本地挂载点
  nfs                  — 文件系统类型
  defaults             — 默认挂载选项
  _netdev              — 标记为网络设备，系统等网络就绪后再挂载
  0 0                  — 不备份、不做 fsck 检查

使用前需要安装 NFS 客户端：
  sudo apt install nfs-common

常用 NFS 挂载选项：
  rsize=8192,wsize=8192 — 设置读写缓冲区大小
  timeo=14              — 超时时间
  soft                  — 超时后返回错误（hard 则一直重试）"""
practice_command = "sudo apt install nfs-common && sudo mkdir -p /mnt/nfs && sudo mount -a"

# ============================================================
# Section 5: 定时任务配置 (crontab)
# ============================================================
[[sections]]
id = "crontab"
title = "定时任务配置"
description = """crontab（cron table）是 Linux 定时任务调度系统。

时间格式（5 个字段）：
  ┌───────────── 分钟 (0-59)
  │ ┌───────────── 小时 (0-23)
  │ │ ┌───────────── 日 (1-31)
  │ │ │ ┌───────────── 月 (1-12)
  │ │ │ │ ┌───────────── 星期 (0-7，0和7都是周日)
  │ │ │ │ │
  * * * * * 要执行的命令

特殊符号：
  *     — 每个时间单位
  */N   — 每隔 N 个单位
  N-M   — 从 N 到 M 的范围
  N,M   — 第 N 和第 M

每个用户有自己的 crontab，root 的 crontab 有系统级权限。
系统级定时任务放在 /etc/crontab 和 /etc/cron.d/ 目录。"""

[[sections.commands]]
command = "crontab -l"
summary = "列出当前用户的定时任务"
simulated_output = """# 每天凌晨 2 点备份数据库
0 2 * * * /usr/local/bin/backup-db.sh >> /var/log/backup.log 2>&1

# 每小时清理临时文件
0 * * * * find /tmp -type f -mtime +7 -delete

# 每周一早上 6 点发送周报
0 6 * * 1 /usr/local/bin/send-weekly-report.sh"""

[[sections.commands]]
command = "crontab -e"
summary = "编辑当前用户的定时任务表（打开默认编辑器）"
simulated_output = """# 该命令会打开编辑器，保存退出后自动安装新的 crontab
# 首次使用会提示选择编辑器：
Select an editor.  To change later, run 'select-editor'.
  1. /bin/nano        <---- easiest
  2. /usr/bin/vim.basic
  3. /usr/bin/vim.tiny

Choose 1-3 [1]:"""

[[sections.config_files]]
id = "crontab-file"
path = "crontab"
name = "用户定时任务表"
description = "当前用户的 cron 定时任务配置，通过 crontab -e 编辑"
sample_content = """# 定时任务格式：
# 分 时 日 月 周  命令
#
# 示例：
# ┌───── 分钟 (0-59)
# │ ┌───── 小时 (0-23)
# │ │ ┌───── 日 (1-31)
# │ │ │ ┌───── 月 (1-12)
# │ │ │ │ ┌───── 星期 (0-7)
# │ │ │ │ │
# * * * * * command

# 环境变量
SHELL=/bin/bash
PATH=/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
MAILTO=admin@example.com

# 每天凌晨 2 点备份数据库
0 2 * * * /usr/local/bin/backup-db.sh >> /var/log/backup.log 2>&1

# 每小时清理 7 天前的临时文件
0 * * * * find /tmp -type f -mtime +7 -delete

# 每周一早上 6 点发送周报
0 6 * * 1 /usr/local/bin/send-weekly-report.sh

# 每 5 分钟检查服务状态
*/5 * * * * /usr/local/bin/health-check.sh

# 每月 1 号凌晨 3 点清理日志
0 3 1 * * /usr/local/bin/rotate-logs.sh"""

[[sections.config_files.lessons]]
title = "添加每日备份任务"
before = "# 每月 1 号凌晨 3 点清理日志\n0 3 1 * * /usr/local/bin/rotate-logs.sh"
after = "# 每月 1 号凌晨 3 点清理日志\n0 3 1 * * /usr/local/bin/rotate-logs.sh\n\n# 每天凌晨 3:30 增量备份 /home 目录\n30 3 * * * tar czf /backup/home-$(date +\\%Y\\%m\\%d).tar.gz /home 2>/dev/null"
explanation = """30 3 * * * 表示每天凌晨 3 点 30 分执行。

命令解析：
  tar czf — 创建 gzip 压缩归档
  $(date +\\%Y\\%m\\%d) — 在文件名中插入日期（如 20260309）
  注意：crontab 中 % 有特殊含义（换行），必须用 \\ 转义
  2>/dev/null — 丢弃错误输出，避免产生大量邮件通知

备份最佳实践：
  1. 选择系统低负载时段
  2. 将备份写入独立磁盘或远程存储
  3. 添加日志记录（>> /var/log/backup.log 2>&1）
  4. 定期检查备份是否成功、文件是否可恢复"""
practice_command = "crontab -l"

[[sections.config_files.lessons]]
title = "添加每周日志轮转任务"
before = "# 每月 1 号凌晨 3 点清理日志\n0 3 1 * * /usr/local/bin/rotate-logs.sh"
after = "# 每月 1 号凌晨 3 点清理日志\n0 3 1 * * /usr/local/bin/rotate-logs.sh\n\n# 每周日凌晨 4 点压缩并轮转应用日志\n0 4 * * 0 cd /var/log/myapp && gzip -9 app.log && mv app.log.gz app-$(date +\\%Y\\%m\\%d).log.gz && touch app.log"
explanation = """0 4 * * 0 表示每周日凌晨 4 点执行。
星期字段中 0 和 7 都代表周日。

命令流程：
  1. cd /var/log/myapp — 进入日志目录
  2. gzip -9 app.log — 最高压缩率压缩当前日志
  3. mv 重命名为带日期的归档文件
  4. touch app.log — 创建新的空日志文件

为什么需要日志轮转：
  - 防止日志文件无限增长占满磁盘
  - 便于按时间段查找历史日志
  - 压缩后节省大量磁盘空间

注意：生产环境推荐使用 logrotate 工具，它提供更完善的轮转策略。"""
practice_command = "crontab -l"
