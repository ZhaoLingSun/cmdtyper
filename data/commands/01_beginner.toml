[[commands.tokens]]
text = "head"
desc = "查看文件开头内容的命令"

[[commands.tokens]]
text = " -n"
desc = "指定要显示的行数"

[[commands.tokens]]
text = " 20"
desc = "显示前 20 行"

[[commands.tokens]]
text = " app.log"
desc = "要查看的日志文件"

[commands.dictation]
prompt = "查看 app.log 文件的前 20 行"
answers = [
    "head -n 20 app.log",
    "head -20 app.log",
    "head --lines 20 app.log",
]

[[commands]]
id = "tail-follow"
command = "tail -f app.log"
summary = "持续跟踪 app.log 文件末尾新增的内容"
simulated_output = """
2025-03-09 10:18:32 [INFO] GET /api/users 200 15ms
2025-03-09 10:18:45 [INFO] POST /api/orders 201 120ms
2025-03-09 10:19:01 [WARN] Rate limit approaching: 85/100
2025-03-09 10:19:15 [INFO] GET /api/health 200 2ms
2025-03-09 10:19:30 [ERROR] Failed to send email: SMTP timeout"""

[[commands.tokens]]
text = "tail"
desc = "查看文件末尾内容的命令"

[[commands.tokens]]
text = " -f"
desc = "持续跟踪文件追加的内容"

[[commands.tokens]]
text = " app.log"
desc = "要持续观察的日志文件"

[commands.dictation]
prompt = "持续跟踪 app.log 文件末尾新增的内容"
answers = [
    "tail -f app.log",
    "tail --follow app.log",
    "tail -f ./app.log",
]

[[commands]]
id = "ln-symbolic"
command = "ln -s /var/log logs"
summary = "创建指向 /var/log 的符号链接 logs"
simulated_output = ""

[[commands.tokens]]
text = "ln"
desc = "创建链接文件的命令"

[[commands.tokens]]
text = " -s"
desc = "创建符号链接而不是硬链接"

[[commands.tokens]]
text = " /var/log"
desc = "符号链接指向的源路径"

[[commands.tokens]]
text = " logs"
desc = "新建的符号链接名称"

[commands.dictation]
prompt = "创建一个名为 logs 的符号链接，指向 /var/log"
answers = [
    "ln -s /var/log logs",
    "ln --symbolic /var/log logs",
    "ln -s /var/log ./logs",
]
