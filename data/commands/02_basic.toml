[[commands.tokens]]
text = " -sh"
desc = "-s 只显示总计 + -h 以易读单位显示"

[[commands.tokens]]
text = " /var/log"
desc = "要统计占用空间的目录"

[commands.dictation]
prompt = "以易读单位汇总查看 /var/log 目录占用空间"
