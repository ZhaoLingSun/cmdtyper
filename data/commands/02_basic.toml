[meta]
category = "system"
difficulty = "basic"
description = "基础权限、查找与系统管理命令"

[[commands]]
id = "chmod-644"
command = "chmod 644 notes.txt"
summary = "把 notes.txt 设置为所有者可读写、其他用户只读"
simulated_output = ""

[[commands.tokens]]
text = "chmod"
desc = "修改文件或目录权限的命令"

[[commands.tokens]]
text = " 644"
desc = "权限模式：所有者读写，组和其他用户只读"

[[commands.tokens]]
text = " notes.txt"
desc = "要修改权限的文件"

[commands.dictation]
prompt = "把 notes.txt 的权限设置为 644"
answers = [
    "chmod 644 notes.txt",
    "chmod 0644 notes.txt",
]

[[commands]]
id = "chmod-exec"
command = "chmod +x deploy.sh"
summary = "为 deploy.sh 增加可执行权限"
simulated_output = ""

[[commands.tokens]]
text = "chmod"
desc = "修改文件或目录权限的命令"

[[commands.tokens]]
text = " +x"
desc = "为匹配的用户增加执行权限"

[[commands.tokens]]
text = " deploy.sh"
desc = "要添加执行权限的脚本文件"

[commands.dictation]
prompt = "给 deploy.sh 增加可执行权限"
answers = [
    "chmod +x deploy.sh",
    "chmod a+x deploy.sh",
    "chmod ugo+x deploy.sh",
]

[[commands]]
id = "chmod-recursive"
command = "chmod -R 755 scripts"
summary = "递归把 scripts 目录及其内容设置为 755 权限"
simulated_output = ""

[[commands.tokens]]
text = "chmod"
desc = "修改文件或目录权限的命令"

[[commands.tokens]]
text = " -R"
desc = "递归处理目录中的所有文件和子目录"

[[commands.tokens]]
text = " 755"
desc = "权限模式：所有者可读写执行，组和其他用户可读执行"

[[commands.tokens]]
text = " scripts"
desc = "要递归修改权限的目录"

[commands.dictation]
prompt = "递归把 scripts 目录及其内容的权限设置为 755"
answers = [
    "chmod -R 755 scripts",
    "chmod -R 0755 scripts",
    "chmod --recursive 755 scripts",
]

[[commands]]
id = "chown-user-group"
command = "chown alice:alice app.log"
summary = "把 app.log 的所有者和所属组改为 alice"
simulated_output = ""

[[commands.tokens]]
text = "chown"
desc = "修改文件所有者和所属组的命令"

[[commands.tokens]]
text = " alice:alice"
desc = "新的所有者和所属组"

[[commands.tokens]]
text = " app.log"
desc = "要修改归属的文件"

[commands.dictation]
prompt = "把 app.log 的所有者和所属组都改为 alice"
answers = [
    "chown alice:alice app.log",
    "chown alice:alice ./app.log",
]

[[commands]]
id = "grep-basic"
command = "grep 'ERROR' app.log"
summary = "在 app.log 中查找包含 ERROR 的行"
simulated_output = """
2025-03-09 08:03:01 [ERROR] Connection timeout: upstream server
2025-03-09 08:15:44 [ERROR] Failed to parse JSON: unexpected token
2025-03-09 08:32:19 [ERROR] Out of memory: cannot allocate 512MB"""

[[commands.tokens]]
text = "grep"
desc = "按模式搜索文本行的命令"

[[commands.tokens]]
text = " 'ERROR'"
desc = "要匹配的关键字"

[[commands.tokens]]
text = " app.log"
desc = "要搜索的日志文件"

[commands.dictation]
prompt = "在 app.log 中查找包含 ERROR 的行"
answers = [
    "grep 'ERROR' app.log",
    "grep \"ERROR\" app.log",
    "grep ERROR app.log",
]

[[commands]]
id = "grep-recursive"
command = "grep -R 'TODO' src"
summary = "递归查找 src 目录中包含 TODO 的文本"
simulated_output = """
src/main.rs:// TODO: add error handling
src/utils/config.rs:// TODO: support YAML format
src/utils/helpers.rs:// TODO: refactor this function"""

[[commands.tokens]]
text = "grep"
desc = "按模式搜索文本行的命令"

[[commands.tokens]]
text = " -R"
desc = "递归搜索目录中的所有文件"

[[commands.tokens]]
text = " 'TODO'"
desc = "要匹配的关键字"

[[commands.tokens]]
text = " src"
desc = "要递归搜索的目录"

[commands.dictation]
prompt = "递归查找 src 目录中包含 TODO 的内容"
answers = [
    "grep -R 'TODO' src",
    "grep --recursive 'TODO' src",
    "grep -R \"TODO\" src",
]

[[commands]]
id = "grep-line-number"
command = "grep -n 'main' src/main.rs"
summary = "查找 src/main.rs 中包含 main 的行并显示行号"
simulated_output = """
1:fn main() {
5:    let config = load_main_config();
12:    // main loop
13:    main_loop(&config);"""

[[commands.tokens]]
text = "grep"
desc = "按模式搜索文本行的命令"

[[commands.tokens]]
text = " -n"
desc = "在输出结果前显示匹配行的行号"

[[commands.tokens]]
text = " 'main'"
desc = "要匹配的关键字"

[[commands.tokens]]
text = " src/main.rs"
desc = "要搜索的源代码文件"

[commands.dictation]
prompt = "查找 src/main.rs 中包含 main 的行，并显示行号"
answers = [
    "grep -n 'main' src/main.rs",
    "grep --line-number 'main' src/main.rs",
    "grep -n \"main\" src/main.rs",
]

[[commands]]
id = "find-name"
command = "find . -name '*.log'"
summary = "在当前目录及子目录中查找所有 .log 文件"
simulated_output = """
./app.log
./logs/access.log
./logs/error.log
./tmp/debug.log"""

[[commands.tokens]]
text = "find"
desc = "在目录树中查找文件的命令"

[[commands.tokens]]
text = " ."
desc = "从当前目录开始查找"

[[commands.tokens]]
text = " -name"
desc = "按文件名模式匹配"

[[commands.tokens]]
text = " '*.log'"
desc = "匹配所有以 .log 结尾的文件名"

[commands.dictation]
prompt = "在当前目录及其子目录中查找所有 .log 文件"
answers = [
    "find . -name '*.log'",
    "find ./ -name '*.log'",
    "find . -name \"*.log\"",
]

[[commands]]
id = "find-type-file"
command = "find /var/log -type f"
summary = "在 /var/log 目录下查找所有普通文件"
simulated_output = """
/var/log/syslog
/var/log/auth.log
/var/log/kern.log
/var/log/alternatives.log
/var/log/bootstrap.log
/var/log/nginx/access.log
/var/log/nginx/error.log"""

[[commands.tokens]]
text = "find"
desc = "在目录树中查找文件的命令"

[[commands.tokens]]
text = " /var/log"
desc = "查找起点目录"

[[commands.tokens]]
text = " -type"
desc = "按文件类型筛选"

[[commands.tokens]]
text = " f"
desc = "只匹配普通文件"

[commands.dictation]
prompt = "在 /var/log 目录下查找所有普通文件"
answers = [
    "find /var/log -type f",
    "find /var/log/ -type f",
]

[[commands]]
id = "tar-create-gzip"
command = "tar -czf backup.tar.gz project"
summary = "把 project 目录打包并压缩为 backup.tar.gz"
simulated_output = ""

[[commands.tokens]]
text = "tar"
desc = "打包和解包归档文件的命令"

[[commands.tokens]]
text = " -czf"
desc = "-c 创建归档 + -z 使用 gzip 压缩 + -f 指定输出文件"

[[commands.tokens]]
text = " backup.tar.gz"
desc = "输出的压缩归档文件名"

[[commands.tokens]]
text = " project"
desc = "要打包的目录"

[commands.dictation]
prompt = "把 project 目录打包并压缩成 backup.tar.gz"
answers = [
    "tar -czf backup.tar.gz project",
    "tar -zcf backup.tar.gz project",
    "tar --create --gzip --file backup.tar.gz project",
]

[[commands]]
id = "tar-extract-gzip"
command = "tar -xzf backup.tar.gz"
summary = "解压 backup.tar.gz 压缩归档文件"
simulated_output = ""

[[commands.tokens]]
text = "tar"
desc = "打包和解包归档文件的命令"

[[commands.tokens]]
text = " -xzf"
desc = "-x 解包归档 + -z 使用 gzip 解压 + -f 指定归档文件"

[[commands.tokens]]
text = " backup.tar.gz"
desc = "要解压的压缩归档文件"

[commands.dictation]
prompt = "解压 backup.tar.gz 压缩归档文件"
answers = [
    "tar -xzf backup.tar.gz",
    "tar -zxf backup.tar.gz",
    "tar --extract --gzip --file backup.tar.gz",
]

[[commands]]
id = "ps-aux"
command = "ps aux"
summary = "以详细格式显示当前系统中的所有进程"
simulated_output = """
USER       PID %CPU %MEM    VSZ   RSS TTY      STAT START   TIME COMMAND
root         1  0.0  0.1 169356 13280 ?        Ss   Mar08   0:03 /sbin/init
root         2  0.0  0.0      0     0 ?        S    Mar08   0:00 [kthreadd]
root       412  0.0  0.2  72312 20148 ?        Ss   Mar08   0:01 /usr/sbin/sshd -D
www-data  1024  0.2  0.5 145892 42360 ?        S    Mar08   2:15 nginx: worker process
ace       1587  0.0  0.1  10864  5440 pts/0    Ss   10:00   0:00 -bash
ace       2103  0.0  0.0   7060  1584 pts/0    R+   10:22   0:00 ps aux"""

[[commands.tokens]]
text = "ps"
desc = "查看进程状态的命令"

[[commands.tokens]]
text = " aux"
desc = "显示所有用户的进程，并包含详细信息"

[commands.dictation]
prompt = "以详细格式显示系统中的所有进程"
answers = [
    "ps aux",
    "ps axu",
    "/bin/ps aux",
]

[[commands]]
id = "kill-force"
command = "kill -9 1234"
summary = "强制终止 PID 为 1234 的进程"
simulated_output = ""

[[commands.tokens]]
text = "kill"
desc = "向进程发送信号的命令"

[[commands.tokens]]
text = " -9"
desc = "发送 SIGKILL 信号，强制结束进程"

[[commands.tokens]]
text = " 1234"
desc = "目标进程的 PID"

[commands.dictation]
prompt = "强制终止 PID 为 1234 的进程"
answers = [
    "kill -9 1234",
    "kill -KILL 1234",
    "kill -s KILL 1234",
]

