[meta]
category = "system"
difficulty = "basic"
description = "基础补充：系统监控、服务管理与硬件信息命令"

[[commands]]
id = "uptime-basic"
command = "uptime"
summary = "显示系统运行时长和平均负载"

[[commands.tokens]]
text = "uptime"
desc = "显示系统已运行多久和负载均值的命令"

[commands.dictation]
prompt = "查看系统运行了多久和当前负载"
answers = ["uptime"]

[[commands]]
id = "w-basic"
command = "w"
summary = "查看当前登录的用户和他们在做什么"

[[commands.tokens]]
text = "w"
desc = "列出已登录用户及其活动的命令"

[commands.dictation]
prompt = "查看当前系统上的登录用户和他们的活动"
answers = ["w"]

[[commands]]
id = "top-basic"
command = "top"
summary = "实时查看系统进程和资源占用"

[[commands.tokens]]
text = "top"
desc = "实时显示系统进程列表和资源使用的命令"

[commands.dictation]
prompt = "实时查看系统进程和资源占用"
answers = ["top"]

[[commands]]
id = "htop-basic"
command = "htop"
summary = "启动交互式进程管理器（界面比 top 更友好）"

[[commands.tokens]]
text = "htop"
desc = "交互式进程查看器（通常需要额外安装）"

[commands.dictation]
prompt = "启动 htop 交互式进程管理器"
answers = ["htop"]

[[commands]]
id = "dmesg-tail"
command = "dmesg | tail -30"
summary = "查看内核消息日志的最后 30 行"

[[commands.tokens]]
text = "dmesg"
desc = "显示内核环缓冲区消息的命令"

[[commands.tokens]]
text = "|"
desc = "把内核日志传给 tail 截取"

[[commands.tokens]]
text = "tail"
desc = "取文本末尾行的命令"

[[commands.tokens]]
text = "-30"
desc = "显示最后 30 行"

[commands.dictation]
prompt = "查看内核消息日志的最后 30 行"
answers = ["dmesg | tail -30", "dmesg | tail -n 30"]

[[commands]]
id = "systemctl-enable-docker"
command = "sudo systemctl enable docker"
summary = "设置 docker 服务开机自启"

[[commands.tokens]]
text = "sudo"
desc = "以管理员权限执行后续命令"

[[commands.tokens]]
text = "systemctl"
desc = "管理 systemd 服务的命令"

[[commands.tokens]]
text = "enable"
desc = "设置服务为开机自启"

[[commands.tokens]]
text = "docker"
desc = "要设置为开机自启的服务名"

[commands.dictation]
prompt = "设置 docker 服务开机自启"
answers = ["sudo systemctl enable docker", "sudo systemctl enable docker.service"]

[[commands]]
id = "systemctl-disable-bluetooth"
command = "sudo systemctl disable bluetooth"
summary = "取消蓝牙服务的开机自启"

[[commands.tokens]]
text = "sudo"
desc = "以管理员权限执行后续命令"

[[commands.tokens]]
text = "systemctl"
desc = "管理 systemd 服务的命令"

[[commands.tokens]]
text = "disable"
desc = "取消服务的开机自启"

[[commands.tokens]]
text = "bluetooth"
desc = "要取消自启的服务名"

[commands.dictation]
prompt = "取消蓝牙服务的开机自启"
answers = ["sudo systemctl disable bluetooth", "sudo systemctl disable bluetooth.service"]

[[commands]]
id = "systemctl-daemon-reload"
command = "sudo systemctl daemon-reload"
summary = "重新加载 systemd 配置（修改 unit 文件后必须执行）"

[[commands.tokens]]
text = "sudo"
desc = "以管理员权限执行后续命令"

[[commands.tokens]]
text = "systemctl"
desc = "管理 systemd 服务的命令"

[[commands.tokens]]
text = "daemon-reload"
desc = "重新加载所有 systemd unit 文件"

[commands.dictation]
prompt = "修改了 systemd 配置后重新加载"
answers = ["sudo systemctl daemon-reload"]

[[commands]]
id = "journalctl-errors-boot"
command = "journalctl -p err -b"
summary = "查看本次启动以来的所有 error 级别日志"

[[commands.tokens]]
text = "journalctl"
desc = "查看 systemd 日志的命令"

[[commands.tokens]]
text = "-p"
desc = "按优先级过滤日志"

[[commands.tokens]]
text = "err"
desc = "只显示 error 及以上级别"

[[commands.tokens]]
text = "-b"
desc = "只看本次启动以来的日志"

[commands.dictation]
prompt = "查看本次启动以来的所有 error 级别日志"
answers = ["journalctl -p err -b", "journalctl --priority err --boot"]

[[commands]]
id = "journalctl-since-hour"
command = "journalctl --since '1 hour ago'"
summary = "查看最近 1 小时内的系统日志"

[[commands.tokens]]
text = "journalctl"
desc = "查看 systemd 日志的命令"

[[commands.tokens]]
text = "--since"
desc = "限定日志起始时间"

[[commands.tokens]]
text = "'1 hour ago'"
desc = "从 1 小时之前开始"

[commands.dictation]
prompt = "查看最近 1 小时的系统日志"
answers = ["journalctl --since '1 hour ago'"]

[[commands]]
id = "lscpu-basic"
command = "lscpu"
summary = "显示 CPU 架构和核心数等信息"

[[commands.tokens]]
text = "lscpu"
desc = "显示 CPU 体系结构信息的命令"

[commands.dictation]
prompt = "查看 CPU 架构和核心数信息"
answers = ["lscpu"]

[[commands]]
id = "hostname-basic"
command = "hostname"
summary = "显示当前主机名"

[[commands.tokens]]
text = "hostname"
desc = "显示或设置系统主机名的命令"

[commands.dictation]
prompt = "查看当前主机名"
answers = ["hostname"]

[[commands]]
id = "date-format"
command = "date '+%Y-%m-%d %H:%M:%S'"
summary = "以指定格式输出当前日期和时间"

[[commands.tokens]]
text = "date"
desc = "显示或设置系统时间的命令"

[[commands.tokens]]
text = "'+%Y-%m-%d %H:%M:%S'"
desc = "自定义输出格式：年-月-日 时:分:秒"

[commands.dictation]
prompt = "以年-月-日 时:分:秒的格式输出当前时间"
answers = ["date '+%Y-%m-%d %H:%M:%S'"]
