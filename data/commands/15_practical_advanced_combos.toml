[[commands]]
id = "find-mtime-delete"
command = "find /var/log -name '*.log' -mtime +30 -delete"
summary = "删除 /var/log 下超过 30 天的 .log 文件"
[[commands.tokens]]
text = "find"
desc = "按条件查找文件的命令"
[[commands.tokens]]
text = "/var/log"
desc = "查找起点目录"
[[commands.tokens]]
text = "-name"
desc = "按文件名模式匹配"
[[commands.tokens]]
text = "'*.log'"
desc = "匹配所有 .log 文件"
[[commands.tokens]]
text = "-mtime"
desc = "按修改时间过滤"
[[commands.tokens]]
text = "+30"
desc = "超过 30 天未修改"
[[commands.tokens]]
text = "-delete"
desc = "直接删除匹配到的文件"
[commands.dictation]
prompt = "删除 /var/log 下修改时间超过 30 天的所有 .log 文件"
answers = ["find /var/log -name '*.log' -mtime +30 -delete"]

[[commands]]
id = "jq-array-map"
command = "jq '.[].name' users.json"
summary = "从 users.json 数组中提取每个元素的 name 字段"
[[commands.tokens]]
text = "jq"
desc = "处理 JSON 数据的命令行工具"
[[commands.tokens]]
text = "'.[].name'"
desc = "jq 过滤器：遍历数组并取出每个对象的 name"
[[commands.tokens]]
text = "users.json"
desc = "输入的 JSON 文件"
[commands.dictation]
prompt = "从 users.json 数组中提取每个元素的 name 字段"
answers = ["jq '.[].name' users.json"]

[[commands]]
id = "jq-select-filter"
command = "jq '.[] | select(.age > 18)' users.json"
summary = "从 users.json 中筛出年龄大于 18 的记录"
[[commands.tokens]]
text = "jq"
desc = "处理 JSON 数据的命令行工具"
[[commands.tokens]]
text = "'.[] | select(.age > 18)'"
desc = "jq 过滤器：遍历数组，只保留 age 大于 18 的"
[[commands.tokens]]
text = "users.json"
desc = "输入的 JSON 文件"
[commands.dictation]
prompt = "从 users.json 中筛选出年龄大于 18 的记录"
answers = ["jq '.[] | select(.age > 18)' users.json"]

