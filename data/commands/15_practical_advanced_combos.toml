[meta]
category = "pipeline"
difficulty = "practical"
description = "实战补充：高级管道组合、文本批处理、一行式运维与日志分析片段"

[[commands]]
id = "awk-sum-column"
command = "awk '{sum += $3} END {print sum}' data.csv"
summary = "用 awk 计算 data.csv 第三列的合计值"
[[commands.tokens]]
text = "awk"
desc = "按字段处理文本的脚本式命令"
[[commands.tokens]]
text = "'{sum += $3} END {print sum}'"
desc = "累加第三列的值，最后输出合计"
[[commands.tokens]]
text = "data.csv"
desc = "输入文件"
[commands.dictation]
prompt = "用 awk 计算 data.csv 中第三列的合计值"
answers = ["awk '{sum += $3} END {print sum}' data.csv"]

[[commands]]
id = "sed-global-replace"
command = "sed -i 's/http:/https:/g' config.yml"
summary = "在 config.yml 中把所有 http: 替换为 https:"
[[commands.tokens]]
text = "sed"
desc = "按规则流式编辑文本的命令"
[[commands.tokens]]
text = "-i"
desc = "直接修改原文件"
[[commands.tokens]]
text = "'s/http:/https:/g'"
desc = "把每行中所有的 http: 替换为 https:"
[[commands.tokens]]
text = "config.yml"
desc = "要修改的配置文件"
[commands.dictation]
prompt = "在 config.yml 中把所有 http: 替换为 https:"
answers = ["sed -i 's/http:/https:/g' config.yml"]

[[commands]]
id = "tr-lowercase"
command = "echo 'Hello World' | tr '[:upper:]' '[:lower:]'"
summary = "把文本全部转为小写"
[[commands.tokens]]
text = "echo"
desc = "输出文本到标准输出"
[[commands.tokens]]
text = "'Hello World'"
desc = "要转换的文本"
[[commands.tokens]]
text = "|"
desc = "把文本传给 tr 转换"
[[commands.tokens]]
text = "tr"
desc = "按字符映射表转换文本的命令"
[[commands.tokens]]
text = "'[:upper:]'"
desc = "源字符集：所有大写字母"
[[commands.tokens]]
text = "'[:lower:]'"
desc = "目标字符集：所有小写字母"
[commands.dictation]
prompt = "把 Hello World 全部转为小写"
answers = ["echo 'Hello World' | tr '[:upper:]' '[:lower:]'"]

[[commands]]
id = "paste-merge-columns"
command = "paste names.txt scores.txt"
summary = "把两个文件按行并排合并"
[[commands.tokens]]
