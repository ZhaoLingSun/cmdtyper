desc = "按行并列合并多个文件的命令"
[[commands.tokens]]
text = "names.txt"
desc = "第一个文件"
[[commands.tokens]]
text = "scores.txt"
desc = "第二个文件"
[commands.dictation]
prompt = "把 names.txt 和 scores.txt 按行并排合并"
