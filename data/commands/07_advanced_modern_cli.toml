[meta]
category = "text_process"
difficulty = "advanced"
description = "进阶补充：现代 CLI 工具、JSON 处理与更高频的开发搜索命令"

[[commands]]
id = "rg-todo-src"
command = "rg -n TODO src"
summary = "递归搜索 src 目录中的 TODO，并显示行号"
simulated_output = """
src/main.rs:14:// TODO: handle invalid input
src/config.rs:42:// TODO: support env override
"""

[[commands.tokens]]
text = "rg"
desc = "ripgrep，递归搜索文本的高性能工具（通常需要额外安装）"

[[commands.tokens]]
text = " -n"
desc = "显示匹配结果所在的行号"

[[commands.tokens]]
text = " TODO"
desc = "要搜索的关键字"

[[commands.tokens]]
text = " src"
desc = "要搜索的目录"

[commands.dictation]
prompt = "用 ripgrep 在 src 目录中递归查找 TODO，并显示行号"
answers = [
    "rg -n TODO src",
    "rg --line-number TODO src",
]

[[commands]]
id = "rg-hidden-config"
command = "rg -uuu api_key ."
summary = "在当前目录中连同隐藏文件一起搜索 api_key"
simulated_output = """
.env:3:API_KEY=dev-1234567890
config/local.yml:12:api_key: "change-me"
"""

[[commands.tokens]]
text = "rg"
desc = "ripgrep，递归搜索文本的高性能工具"

[[commands.tokens]]
text = " -uuu"
desc = "关闭常见过滤，包含隐藏文件和被忽略文件"

[[commands.tokens]]
text = " api_key"
desc = "要搜索的关键字"

[[commands.tokens]]
text = " ."
desc = "从当前目录开始搜索"

[commands.dictation]
prompt = "在当前目录中，包括隐藏和忽略文件，一起搜索 api_key"
answers = [
    "rg -uuu api_key .",
    "rg -uuu \"api_key\" .",
]

[[commands]]
id = "fd-rust-files"
command = "fd -e rs main src"
summary = "在 src 目录中查找文件名包含 main 的 Rust 文件"
simulated_output = """
src/main.rs
src/bin/main.rs
"""

[[commands.tokens]]
text = "fd"
desc = "fd，现代化文件查找工具（通常需要额外安装）"

[[commands.tokens]]
text = " -e"
desc = "按文件扩展名过滤"

[[commands.tokens]]
text = " rs"
desc = "只匹配 Rust 源码文件"

[[commands.tokens]]
text = " main"
desc = "文件名匹配模式"

[[commands.tokens]]
text = " src"
desc = "搜索目录"

[commands.dictation]
prompt = "在 src 目录中查找名字包含 main 的 Rust 文件"
answers = [
    "fd -e rs main src",
    "fd --extension rs main src",
]

[[commands]]
id = "bat-numbered-readme"
command = "bat -n README.md"
summary = "带行号高亮查看 README.md"
simulated_output = """
   1 # cmdtyper-v2
   2
   3 交互式 Linux 命令练习工具
"""

[[commands.tokens]]
text = "bat"
desc = "带语法高亮的 cat 替代工具（通常需要额外安装）"

[[commands.tokens]]
text = " -n"
desc = "显示行号"

[[commands.tokens]]
text = " README.md"
desc = "要查看的文件"

[commands.dictation]
prompt = "使用 bat 带行号查看 README.md"
answers = [
    "bat -n README.md",
]

[[commands]]
id = "bat-show-all-hosts"
command = "bat -A /etc/hosts"
summary = "显示 /etc/hosts，并高亮不可见字符"
simulated_output = """
   1 127.0.0.1	localhost
   2 ::1	localhost ip6-localhost ip6-loopback
   3 10.9.146.6	intranet
"""

[[commands.tokens]]
text = "bat"
desc = "带语法高亮的 cat 替代工具"

[[commands.tokens]]
text = " -A"
desc = "显示不可见字符"

[[commands.tokens]]
text = " /etc/hosts"
desc = "要查看的系统 hosts 文件"

[commands.dictation]
prompt = "用 bat 查看 /etc/hosts，并显示不可见字符"
answers = [
    "bat -A /etc/hosts",
    "bat --show-all /etc/hosts",
]

[[commands]]
id = "eza-long-icons"
command = "eza -la --icons"
summary = "以现代化样式显示当前目录的详细列表和图标"
simulated_output = """
drwxr-xr-x  ace ace  4.0 KB  📁 .git
-rw-r--r--  ace ace  1.3 KB  📄 Cargo.toml
drwxr-xr-x  ace ace  4.0 KB  📁 src
"""

[[commands.tokens]]
text = "eza"
desc = "eza，现代化 ls 替代工具（通常需要额外安装）"

[[commands.tokens]]
text = " -la"
desc = "详细列表并显示隐藏文件"

[[commands.tokens]]
text = " --icons"
desc = "显示文件类型图标"

[commands.dictation]
prompt = "用 eza 详细显示当前目录，包括隐藏文件和图标"
answers = [
    "eza -la --icons",
]

[[commands]]
id = "jq-pretty-print"
command = "jq . response.json"
summary = "格式化输出 response.json 中的 JSON 内容"
simulated_output = """
{
  "status": "ok",
  "data": {
    "id": 42,
    "name": "alice"
  }
}
"""

[[commands.tokens]]
text = "jq"
desc = "处理 JSON 数据的命令行工具（通常需要额外安装）"

[[commands.tokens]]
text = " ."
desc = "jq 过滤器：原样输出并格式化整个 JSON"

[[commands.tokens]]
text = " response.json"
desc = "输入的 JSON 文件"

[commands.dictation]
prompt = "用 jq 格式化输出 response.json 的 JSON 内容"
answers = [
    "jq . response.json",
    "jq \".\" response.json",
]

[[commands]]
id = "jq-extract-name"
command = "jq -r .name package.json"
summary = "从 package.json 中提取 name 字段的原始字符串值"
simulated_output = "cmdtyper-v2"

[[commands.tokens]]
text = "jq"
desc = "处理 JSON 数据的命令行工具"

[[commands.tokens]]
text = " -r"
desc = "输出原始字符串，不带 JSON 引号"

[[commands.tokens]]
text = " .name"
desc = "jq 过滤器：读取顶层 name 字段"

[[commands.tokens]]
text = " package.json"
desc = "输入的 JSON 文件"

[commands.dictation]
prompt = "从 package.json 中提取 name 字段，并按原始字符串输出"
answers = [
    "jq -r .name package.json",
    "jq --raw-output .name package.json",
]

[[commands]]
id = "fzf-preview-bat"
command = "fzf --preview bat --color=always --line-range=:200 {}"
summary = "使用 fzf 选择文件时，右侧用 bat 预览前 200 行"
simulated_output = """
src/main.rs
src/ui/mod.rs
src/data/loader.rs
"""

[[commands.tokens]]
text = "fzf"
desc = "交互式模糊搜索工具（通常需要额外安装）"

[[commands.tokens]]
text = " --preview"
desc = "为候选项提供预览命令"

[[commands.tokens]]
text = " bat --color=always --line-range=:200 {}"
desc = "使用 bat 彩色预览选中文件前 200 行"

[commands.dictation]
prompt = "使用 fzf 并用 bat 预览选中文件的前 200 行"
answers = [
    "fzf --preview bat --color=always --line-range=:200 {}",
    "fzf --preview \"bat --color=always --line-range=:200 {}\"",
]

[[commands]]
id = "xargs-rm-log"
command = "find . -name *.log -print0 | xargs -0 rm"
summary = "安全删除当前目录下所有 .log 文件，兼容空格文件名"
simulated_output = """
file1
file2
file3
"""

[[commands.tokens]]
text = "find"
desc = "按条件查找文件"

[[commands.tokens]]
text = " ."
desc = "从当前目录开始查找"

[[commands.tokens]]
text = " -name"
desc = "按文件名模式匹配"

[[commands.tokens]]
text = " *.log"
desc = "匹配所有 .log 文件"

[[commands.tokens]]
text = " -print0"
desc = "用空字符分隔输出结果，避免空格问题"

[[commands.tokens]]
text = " |"
desc = "把查找结果传给 xargs"

[[commands.tokens]]
text = " xargs"
desc = "把标准输入转换成命令参数列表"

[[commands.tokens]]
text = " -0"
desc = "按空字符读取输入项"

[[commands.tokens]]
text = " rm"
desc = "删除传入的文件"

[commands.dictation]
prompt = "安全地删除当前目录下所有 .log 文件，兼容文件名中的空格"
answers = [
    "find . -name *.log -print0 | xargs -0 rm",
    "find . -name \"*.log\" -print0 | xargs -0 rm",
]

[[commands]]
id = "grep-context-error"
command = "grep -C 2 ERROR app.log"
summary = "查找 ERROR，并额外显示前后各 2 行上下文"
simulated_output = """
42-2026-03-14 08:39:10 WARN retrying request
43:2026-03-14 08:39:12 ERROR failed to connect redis
44-2026-03-14 08:39:13 INFO backoff 200ms
"""

[[commands.tokens]]
text = "grep"
desc = "按模式搜索文本行的命令"

[[commands.tokens]]
text = " -C"
desc = "显示匹配行前后指定数量的上下文"

[[commands.tokens]]
text = " 2"
desc = "显示前后各 2 行"

[[commands.tokens]]
text = " ERROR"
desc = "要匹配的错误关键字"

[[commands.tokens]]
text = " app.log"
desc = "要搜索的日志文件"

[commands.dictation]
prompt = "查找 app.log 中的 ERROR，并显示匹配行前后各 2 行"
answers = [
    "grep -C 2 ERROR app.log",
    "grep --context 2 ERROR app.log",
    "grep -C 2 \"ERROR\" app.log",
]

[[commands]]
id = "cut-colon-first"
command = "cut -d: -f1 /etc/passwd"
summary = "按冒号分隔取出 /etc/passwd 的第一列"
simulated_output = """
root
daemon
bin
sys
ace
"""

[[commands.tokens]]
text = "cut"
desc = "按分隔符提取字段的命令"

[[commands.tokens]]
text = " -d:"
desc = "把字段分隔符指定为冒号"

[[commands.tokens]]
text = " -f1"
desc = "只取第 1 个字段"

[[commands.tokens]]
text = " /etc/passwd"
desc = "输入文件"

[commands.dictation]
prompt = "从 /etc/passwd 中按冒号分隔取出第一列"
answers = [
    "cut -d: -f1 /etc/passwd",
    "cut -d : -f1 /etc/passwd",
]

[[commands]]
id = "sort-uniq-top-ip"
command = "cut -d  -f1 access.log | sort | uniq -c | sort -rn | head"
summary = "统计 access.log 中访问次数最多的 IP"
simulated_output = """
  512 10.0.0.12
  301 10.0.0.7
  188 10.0.0.45
"""

[[commands.tokens]]
text = "cut"
desc = "按分隔符提取字段的命令"

[[commands.tokens]]
text = " -d "
desc = "把字段分隔符指定为空格"

[[commands.tokens]]
text = " -f1"
desc = "只取第一列 IP 地址"

[[commands.tokens]]
text = " access.log"
desc = "输入访问日志文件"

[[commands.tokens]]
text = " |"
desc = "把前一个命令的输出传给下一个命令"

[[commands.tokens]]
text = " sort"
desc = "对文本行排序"

[[commands.tokens]]
text = " |"
desc = "把排序后的结果继续传递"

[[commands.tokens]]
text = " uniq"
desc = "统计相邻重复行"

[[commands.tokens]]
text = " -c"
desc = "显示每种重复行的出现次数"

[[commands.tokens]]
text = " |"
desc = "继续把结果传递到后续命令"

[[commands.tokens]]
text = " sort"
desc = "再次排序统计结果"

[[commands.tokens]]
text = " -rn"
desc = "按数值逆序排序"

[[commands.tokens]]
text = " |"
desc = "把排序结果传给 head"

[[commands.tokens]]
text = " head"
desc = "只显示开头几行结果"

[commands.dictation]
prompt = "统计 access.log 中访问次数最多的 IP 地址"
answers = [
    "cut -d  -f1 access.log | sort | uniq -c | sort -rn | head",
    "cut -d\" \" -f1 access.log | sort | uniq -c | sort -rn | head",
]
