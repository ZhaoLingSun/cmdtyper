[meta]
category = "pipeline"
difficulty = "practical"
description = "实战补充：开发、运维、Git、tmux、Docker 与远程协作命令"

[[commands]]
id = "git-status-short"
command = "git status -sb"
summary = "用简洁分支格式查看当前 Git 工作区状态"
simulated_output = """
## main...origin/main
 M src/main.rs
 M data/commands/05_beginner_extra.toml
"""

[[commands.tokens]]
text = "git"
desc = "分布式版本控制系统命令"

[[commands.tokens]]
text = " status"
desc = "查看工作区和暂存区状态"

[[commands.tokens]]
text = " -sb"
desc = "简洁输出并显示分支信息"

[commands.dictation]
prompt = "用简洁格式查看当前 Git 工作区状态，并带上分支信息"
answers = [
    "git status -sb",
]

[[commands]]
id = "git-log-oneline-graph"
command = "git log --oneline --graph --decorate -10"
summary = "以单行图形化方式查看最近 10 条提交"
simulated_output = """
* 9f1a3d2 (HEAD -> main, origin/main) feat: add practical command set
* 4c8b771 fix: normalize dictation prompts
* a1e7c90 docs: update README examples
"""

[[commands.tokens]]
text = "git"
desc = "分布式版本控制系统命令"

[[commands.tokens]]
text = " log"
desc = "查看提交历史"

[[commands.tokens]]
text = " --oneline"
desc = "每个提交只显示一行摘要"

[[commands.tokens]]
text = " --graph"
desc = "用 ASCII 图显示分支合并关系"

[[commands.tokens]]
text = " --decorate"
desc = "显示分支和标签引用名"

[[commands.tokens]]
text = " -10"
desc = "只显示最近 10 条提交"

[commands.dictation]
prompt = "图形化地查看最近 10 条 Git 提交，每条只显示一行"
answers = [
    "git log --oneline --graph --decorate -10",
]

[[commands]]
id = "git-diff-staged"
command = "git diff --staged"
summary = "查看已经暂存但尚未提交的改动"
simulated_output = """
diff --git a/src/main.rs b/src/main.rs
index 1c2e3d4..8a9b0c1 100644
--- a/src/main.rs
+++ b/src/main.rs
@@ -10,6 +10,7 @@
+    println!("ready");
"""

[[commands.tokens]]
text = "git"
desc = "分布式版本控制系统命令"

[[commands.tokens]]
text = " diff"
desc = "比较改动差异"

[[commands.tokens]]
text = " --staged"
desc = "只查看暂存区相对于 HEAD 的改动"

[commands.dictation]
prompt = "查看已经暂存但还没提交的 Git 改动"
answers = [
    "git diff --staged",
    "git diff --cached",
]

[[commands]]
id = "git-grep-todo"
command = "git grep -n TODO"
summary = "在 Git 跟踪文件中搜索 TODO，并显示行号"
simulated_output = """
src/main.rs:14:// TODO: improve error message
src/ui/mod.rs:88:// TODO: add key hint
"""

[[commands.tokens]]
text = "git"
desc = "分布式版本控制系统命令"

[[commands.tokens]]
text = " grep"
desc = "在 Git 跟踪文件里搜索文本"

[[commands.tokens]]
text = " -n"
desc = "显示匹配结果的行号"

[[commands.tokens]]
text = " TODO"
desc = "要搜索的关键字"

[commands.dictation]
prompt = "在当前 Git 仓库已跟踪文件中搜索 TODO，并显示行号"
answers = [
    "git grep -n TODO",
]

[[commands]]
id = "tmux-new-session"
command = "tmux new -s dev"
summary = "创建一个名为 dev 的 tmux 新会话"
simulated_output = "[detached (from session dev)]"

[[commands.tokens]]
text = "tmux"
desc = "终端复用器，可保持长期会话（通常需要额外安装）"

[[commands.tokens]]
text = " new"
desc = "创建新会话"

[[commands.tokens]]
text = " -s"
desc = "指定会话名称"

[[commands.tokens]]
text = " dev"
desc = "新建的会话名"

[commands.dictation]
prompt = "创建一个名为 dev 的 tmux 会话"
answers = [
    "tmux new -s dev",
    "tmux new-session -s dev",
]

[[commands]]
id = "tmux-attach-session"
command = "tmux attach -t dev"
summary = "重新连接到名为 dev 的 tmux 会话"
simulated_output = "[attached to session dev]"

[[commands.tokens]]
text = "tmux"
desc = "终端复用器"

[[commands.tokens]]
text = " attach"
desc = "连接到已有会话"

[[commands.tokens]]
text = " -t"
desc = "指定目标会话"

[[commands.tokens]]
text = " dev"
desc = "要连接的会话名"

[commands.dictation]
prompt = "重新连接到名为 dev 的 tmux 会话"
answers = [
    "tmux attach -t dev",
    "tmux attach-session -t dev",
]

[[commands]]
id = "docker-ps-format"
command = "docker ps --format {{.Names}} {{.Status}}"
summary = "只显示容器名称和状态"
simulated_output = """
web Up 3 hours
db Up 3 hours (healthy)
redis Up 3 hours
"""

[[commands.tokens]]
text = "docker"
desc = "容器管理命令"

[[commands.tokens]]
text = " ps"
desc = "列出正在运行的容器"

[[commands.tokens]]
text = " --format"
desc = "自定义输出格式"

[[commands.tokens]]
text = " {{.Names}} {{.Status}}"
desc = "只输出容器名称和状态字段"

[commands.dictation]
prompt = "用自定义格式列出 Docker 容器名称和状态"
answers = [
    "docker ps --format {{.Names}} {{.Status}}",
    "docker ps --format \"{{.Names}} {{.Status}}\"",
]

[[commands]]
