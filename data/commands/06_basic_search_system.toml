[meta]
category = "search"
difficulty = "basic"
description = "基础补充：搜索、帮助、系统信息与网络诊断命令"

[[commands]]
id = "which-python3"
command = "which python3"
summary = "查看 python3 命令实际会执行哪个可执行文件"
simulated_output = "/usr/bin/python3"

[[commands.tokens]]
text = "which"
desc = "在 PATH 中查找命令位置的命令"

[[commands.tokens]]
text = " python3"
desc = "要查找路径的命令名"

[commands.dictation]
prompt = "查看 python3 命令对应的可执行文件路径"
answers = [
    "which python3",
]

[[commands]]
id = "whereis-nginx"
command = "whereis nginx"
summary = "查找 nginx 的二进制、源码和 man 手册位置"
simulated_output = "nginx: /usr/sbin/nginx /usr/lib/nginx /etc/nginx /usr/share/nginx"

[[commands.tokens]]
text = "whereis"
desc = "查找命令相关文件位置的命令"

[[commands.tokens]]
text = " nginx"
desc = "要查找的程序名"

[commands.dictation]
prompt = "查找 nginx 的可执行文件和文档位置"
answers = [
    "whereis nginx",
]

[[commands]]
id = "type-cd"
command = "type cd"
summary = "查看 cd 是 shell 内建、别名还是外部命令"
simulated_output = "cd is a shell builtin"

[[commands.tokens]]
text = "type"
desc = "判断命令类型的 shell 命令"

[[commands.tokens]]
text = " cd"
desc = "要检查类型的命令"

[commands.dictation]
prompt = "检查 cd 属于什么类型的命令"
answers = [
    "type cd",
]

[[commands]]
id = "man-grep"
command = "man grep"
summary = "打开 grep 命令的手册页"
simulated_output = """
GREP(1) User Commands GREP(1)
NAME
    grep, egrep, fgrep - print lines that match patterns
"""

[[commands.tokens]]
text = "man"
desc = "查看命令手册页的命令"

[[commands.tokens]]
text = " grep"
desc = "要查看手册的命令名"

[commands.dictation]
prompt = "打开 grep 的手册页"
answers = [
    "man grep",
]

[[commands]]
id = "apropos-password"
command = "apropos password"
summary = "搜索和 password 相关的 man 手册条目"
simulated_output = """
passwd (1) - change user password
chpasswd (8) - update passwords in batch mode
pwck (8) - verify integrity of password files
"""

[[commands.tokens]]
text = "apropos"
desc = "按关键字搜索 man 手册主题的命令"

[[commands.tokens]]
text = " password"
desc = "要搜索的关键词"

[commands.dictation]
prompt = "按关键字搜索和 password 相关的 man 手册条目"
answers = [
    "apropos password",
]

[[commands]]
id = "find-case-insensitive"
command = "find . -iname *.jpg"
summary = "不区分大小写地查找当前目录下的 jpg 图片"
simulated_output = """
./photos/IMG_1024.JPG
./assets/banner.jpg
./screenshots/homepage.JPG
"""

[[commands.tokens]]
text = "find"
desc = "在目录树中查找文件的命令"

[[commands.tokens]]
text = " ."
desc = "从当前目录开始查找"

[[commands.tokens]]
text = " -iname"
desc = "按文件名匹配且忽略大小写"

[[commands.tokens]]
text = " *.jpg"
desc = "匹配所有 jpg 图片文件名"

[commands.dictation]
prompt = "不区分大小写地查找当前目录下所有 jpg 图片"
answers = [
    "find . -iname *.jpg",
    "find . -iname \"*.jpg\"",
]

[[commands]]
id = "locate-bashrc"
command = "locate bashrc"
summary = "快速查找系统中名字包含 bashrc 的路径"
simulated_output = """
/etc/bash.bashrc
/home/ace/.bashrc
"""

[[commands.tokens]]
text = "locate"
desc = "基于索引数据库快速查找路径的命令"

[[commands.tokens]]
text = " bashrc"
desc = "要搜索的路径关键字"

[commands.dictation]
prompt = "快速查找系统中名称包含 bashrc 的路径"
answers = [
    "locate bashrc",
]

[[commands]]
id = "uname-all"
command = "uname -a"
summary = "显示内核、主机名和系统架构等完整信息"
simulated_output = "Linux intranet 6.8.0-58-generic #60-Ubuntu SMP x86_64 GNU/Linux"

[[commands.tokens]]
text = "uname"
desc = "显示系统内核和架构信息的命令"

[[commands.tokens]]
text = " -a"
desc = "显示全部系统信息"

[commands.dictation]
prompt = "显示完整的系统内核与架构信息"
answers = [
    "uname -a",
    "uname --all",
]

[[commands]]
id = "df-human-search"
command = "df -h"
summary = "以易读单位查看各文件系统磁盘使用情况"
simulated_output = """
Filesystem      Size  Used Avail Use% Mounted on
/dev/nvme0n1p2   1.8T  612G  1.1T  36% /
tmpfs            126G  2.0M  126G   1% /run
"""

[[commands.tokens]]
text = "df"
desc = "查看文件系统磁盘空间使用情况的命令"

[[commands.tokens]]
text = " -h"
desc = "以 KB、MB、GB 等易读单位显示"

[commands.dictation]
prompt = "以易读单位查看磁盘空间使用情况"
answers = [
    "df -h",
    "df --human-readable",
]

[[commands]]
id = "du-human-summary"
command = "du -sh /var/log"
summary = "汇总查看 /var/log 目录占用了多少磁盘空间"
simulated_output = "2.1G	/var/log"

[[commands.tokens]]
text = "du"
desc = "查看文件或目录磁盘占用大小的命令"

[[commands.tokens]]
text = " -sh"
desc = "-s 只给出汇总 + -h 以易读单位显示"

[[commands.tokens]]
text = " /var/log"
desc = "要统计大小的目录"

[commands.dictation]
prompt = "汇总查看 /var/log 目录占用的磁盘空间，并用易读单位显示"
answers = [
    "du -sh /var/log",
    "du -hs /var/log",
]

[[commands]]
id = "free-human-search"
command = "free -h"
summary = "以易读单位查看内存和 swap 使用情况"
simulated_output = """
               total        used        free      shared  buff/cache   available
Mem:           1.5Ti       112Gi       1.1Ti       512Mi       302Gi       1.3Ti
Swap:           32Gi          0B        32Gi
"""

[[commands.tokens]]
text = "free"
desc = "查看内存使用情况的命令"

[[commands.tokens]]
text = " -h"
desc = "以易读单位显示内存大小"

[commands.dictation]
prompt = "以易读单位查看当前内存和 swap 使用情况"
answers = [
    "free -h",
    "free --human",
]

[[commands]]
id = "lsblk-basic"
command = "lsblk"
summary = "以树状结构显示块设备列表"
simulated_output = """
NAME        MAJ:MIN RM   SIZE RO TYPE MOUNTPOINTS
nvme0n1     259:0    0   1.8T  0 disk
├─nvme0n1p1 259:1    0     1G  0 part /boot/efi
└─nvme0n1p2 259:2    0   1.8T  0 part /
"""

[[commands.tokens]]
text = "lsblk"
desc = "列出磁盘与分区等块设备的命令"

[commands.dictation]
prompt = "查看当前系统的磁盘和分区设备列表"
answers = [
    "lsblk",
]

[[commands]]
id = "ip-address-show"
command = "ip addr show"
summary = "查看所有网络接口的地址信息"
simulated_output = """
2: eth0: <BROADCAST,MULTICAST,UP,LOWER_UP> mtu 1500
    inet 10.9.146.6/24 brd 10.9.146.255 scope global eth0
3: lo: <LOOPBACK,UP,LOWER_UP> mtu 65536
    inet 127.0.0.1/8 scope host lo
"""

[[commands.tokens]]
text = "ip"
desc = "现代网络配置与查看命令"

[[commands.tokens]]
text = " addr"
desc = "地址相关子命令"

[[commands.tokens]]
text = " show"
desc = "显示当前配置和状态"

[commands.dictation]
prompt = "查看所有网络接口的地址信息"
answers = [
    "ip addr show",
    "ip a",
]

[[commands]]
id = "ss-listen-tcp"
command = "ss -lnt"
summary = "查看当前正在监听的 TCP 端口"
simulated_output = """
State  Recv-Q Send-Q Local Address:Port  Peer Address:Port
LISTEN 0      511         0.0.0.0:22         0.0.0.0:*
LISTEN 0      128       127.0.0.1:5432       0.0.0.0:*
"""

[[commands.tokens]]
text = "ss"
desc = "查看套接字和网络连接状态的命令"

[[commands.tokens]]
text = " -lnt"
desc = "-l 只看监听 + -n 不解析名称 + -t 只看 TCP"

[commands.dictation]
prompt = "查看当前系统正在监听的 TCP 端口"
answers = [
    "ss -lnt",
    "ss -tln",
]

[[commands]]
id = "ping-count-four"
command = "ping -c 4 8.8.8.8"
summary = "向 8.8.8.8 发送 4 次 ping 请求"
simulated_output = """
PING 8.8.8.8 (8.8.8.8) 56(84) bytes of data.
64 bytes from 8.8.8.8: icmp_seq=1 ttl=117 time=31.8 ms
64 bytes from 8.8.8.8: icmp_seq=2 ttl=117 time=32.1 ms
--- 8.8.8.8 ping statistics ---
4 packets transmitted, 4 received, 0% packet loss
"""

[[commands.tokens]]
text = "ping"
desc = "测试网络连通性和延迟的命令"

[[commands.tokens]]
text = " -c"
desc = "指定发送请求的次数"

[[commands.tokens]]
text = " 4"
desc = "发送 4 次请求"

[[commands.tokens]]
text = " 8.8.8.8"
desc = "目标 IP 地址"

[commands.dictation]
prompt = "向 8.8.8.8 发送 4 次 ping 请求"
answers = [
    "ping -c 4 8.8.8.8",
]

[[commands]]
id = "curl-head-search"
command = "curl -I https://example.com"
summary = "只获取 https://example.com 的响应头"
simulated_output = """
HTTP/2 200
content-type: text/html; charset=UTF-8
content-length: 1256
"""

[[commands.tokens]]
text = "curl"
desc = "发送 HTTP 请求的命令行工具"

[[commands.tokens]]
text = " -I"
desc = "只请求并显示响应头"

[[commands.tokens]]
text = " https://example.com"
desc = "目标 URL"

[commands.dictation]
prompt = "只获取 https://example.com 的响应头"
answers = [
    "curl -I https://example.com",
    "curl --head https://example.com",
]

[[commands]]
id = "wget-output-file"
command = "wget -O index.html https://example.com"
summary = "下载网页并保存为 index.html"
simulated_output = """
--2026-03-14 08:30:12--  https://example.com/
Resolving example.com... 93.184.216.34
Saving to: index.html

index.html 100%[===================>] 1.23K  --.-KB/s in 0s
"""

[[commands.tokens]]
text = "wget"
desc = "下载文件的命令行工具"

[[commands.tokens]]
text = " -O"
desc = "指定输出文件名"

[[commands.tokens]]
text = " index.html"
desc = "保存后的文件名"

[[commands.tokens]]
text = " https://example.com"
desc = "要下载的 URL"

[commands.dictation]
prompt = "下载 https://example.com 并保存为 index.html"
answers = [
    "wget -O index.html https://example.com",
]

[[commands]]
id = "dig-short-domain"
command = "dig +short example.com"
summary = "快速查询 example.com 的解析结果"
simulated_output = "93.184.216.34"

[[commands.tokens]]
text = "dig"
desc = "查询 DNS 记录的命令"

[[commands.tokens]]
text = " +short"
desc = "只输出精简结果"

[[commands.tokens]]
text = " example.com"
desc = "要查询解析的域名"

[commands.dictation]
prompt = "快速查询 example.com 的 DNS 解析结果"
answers = [
    "dig +short example.com",
]
