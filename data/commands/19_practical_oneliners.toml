[[commands]]
id = "parallel-ping"
command = "seq 1 254 | xargs -P 50 -I{} ping -c 1 -W 1 192.168.1.{}"
summary = "并行 ping 整个子网 192.168.1.0/24 的所有主机"
[[commands.tokens]]
text = "seq"
desc = "生成数字序列"
[[commands.tokens]]
text = " 1"
desc = "起始值"
[[commands.tokens]]
text = " 254"
desc = "结束值"
[[commands.tokens]]
text = " |"
desc = "管道"
[[commands.tokens]]
text = " xargs"
desc = "把输入转换成命令参数"
[[commands.tokens]]
text = " -P"
desc = "最大并行进程数"
[[commands.tokens]]
text = " 50"
desc = "同时运行 50 个 ping"
[[commands.tokens]]
text = " -I{}"
desc = "把每个输入项替换到 {} 处"
[[commands.tokens]]
text = " ping"
desc = "网络探测"
[[commands.tokens]]
text = " -c"
desc = "发送次数"
[[commands.tokens]]
text = " 1"
desc = "只发 1 次"
[[commands.tokens]]
text = " -W"
desc = "超时秒数"
[[commands.tokens]]
text = " 1"
desc = "1 秒超时"
[[commands.tokens]]
text = " 192.168.1.{}"
desc = "IP 地址中最后一段由 seq 生成"
[commands.dictation]
prompt = "并行 ping 192.168.1.0/24 子网中的所有 254 台主机"
answers = ["seq 1 254 | xargs -P 50 -I{} ping -c 1 -W 1 192.168.1.{}"]

[[commands]]
