[meta]
category = "scripting"
difficulty = "practical"
description = "实战补充：真实运维一行式、批量操作、磁盘清理与日志切割命令"

[[commands]]
id = "rename-batch-jpg"
command = "for f in *.jpeg; do mv -- \"$f\" \"${f%.jpeg}.jpg\"; done"
summary = "把当前目录下所有 .jpeg 文件重命名为 .jpg"
[[commands.tokens]]
text = "for"
desc = "shell 循环关键字"
[[commands.tokens]]
text = " f"
desc = "循环变量"
[[commands.tokens]]
text = " in"
desc = "指定循环数据"
[[commands.tokens]]
text = " *.jpeg"
desc = "匹配所有 .jpeg 文件"
[[commands.tokens]]
text = ";"
desc = "命令分隔符"
[[commands.tokens]]
text = " do"
desc = "循环体开始"
[[commands.tokens]]
text = " mv"
desc = "移动或重命名文件"
[[commands.tokens]]
text = " --"
desc = "防止文件名被当作选项"
[[commands.tokens]]
text = " \"$f\""
desc = "原文件名"
[[commands.tokens]]
text = " \"${f%.jpeg}.jpg\""
desc = "去掉 .jpeg 后缀再加上 .jpg"
[[commands.tokens]]
text = ";"
desc = "命令分隔符"
[[commands.tokens]]
text = " done"
desc = "循环体结束"
[commands.dictation]
prompt = "把当前目录下所有 .jpeg 文件批量重命名为 .jpg"
answers = ["for f in *.jpeg; do mv -- \"$f\" \"${f%.jpeg}.jpg\"; done"]

[[commands]]
id = "disk-top-dirs"
command = "du -h --max-depth=1 / 2>/dev/null | sort -rh | head -20"
summary = "查看根目录下各一级子目录的空间占用，按大小排列取前 20"
[[commands.tokens]]
text = "du"
desc = "查看磁盘占用大小的命令"
[[commands.tokens]]
text = " -h"
desc = "以易读单位显示"
[[commands.tokens]]
text = " --max-depth=1"
desc = "只统计一级子目录"
[[commands.tokens]]
text = " /"
desc = "从根目录开始"
[[commands.tokens]]
text = " 2>/dev/null"
desc = "丢弃权限不足等错误输出"
[[commands.tokens]]
text = " |"
desc = "管道"
[[commands.tokens]]
text = " sort"
desc = "排序"
[[commands.tokens]]
text = " -rh"
desc = "按易读数值逆序"
[[commands.tokens]]
text = " |"
desc = "管道"
[[commands.tokens]]
text = " head"
desc = "取前几行"
[[commands.tokens]]
text = " -20"
desc = "取前 20 项"
[commands.dictation]
prompt = "查看根目录下各一级子目录的空间占用，按大小排列取前 20"
answers = ["du -h --max-depth=1 / 2>/dev/null | sort -rh | head -20"]

[[commands]]
id = "find-empty-dirs"
command = "find . -type d -empty -delete"
summary = "查找并删除当前目录下所有空目录"
