[[commands]]
id = "grep-count-error-per-hour"
command = "grep 'ERROR' app.log | awk '{print substr($2,1,13)}' | sort | uniq -c"
summary = "按小时统计 app.log 中 ERROR 的出现次数"
[[commands.tokens]]
text = "grep"
desc = "按模式搜索文本行"
[[commands.tokens]]
text = " 'ERROR'"
desc = "要匹配的关键字"
[[commands.tokens]]
text = " app.log"
desc = "日志文件"
[[commands.tokens]]
text = " |"
desc = "管道"
[[commands.tokens]]
text = " awk"
desc = "按字段处理文本"
[[commands.tokens]]
text = " '{print substr($2,1,13)}'"
desc = "截取第二列的前 13 个字符（小时级时间戳）"
[[commands.tokens]]
text = " |"
desc = "管道"
[[commands.tokens]]
text = " sort"
desc = "排序"
[[commands.tokens]]
text = " |"
desc = "管道"
[[commands.tokens]]
text = " uniq"
desc = "统计相邻重复行"
[[commands.tokens]]
text = " -c"
desc = "显示每种重复行的计数"
[commands.dictation]
prompt = "按小时统计 app.log 中 ERROR 出现的次数"
answers = ["grep 'ERROR' app.log | awk '{print substr($2,1,13)}' | sort | uniq -c"]

