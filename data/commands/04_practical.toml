[[commands]]
id = "journalctl-debug-sshd"
command = "journalctl -xeu sshd"
summary = "查看 sshd 服务的最新详细日志并附带解释信息"
simulated_output = """
Mar 09 08:12:30 server sshd[3120]: Accepted publickey for ace from 192.168.1.10 port 52341 ssh2
