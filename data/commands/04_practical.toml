[[commands]]
id = "systemctl-restart-nginx"
command = "systemctl restart nginx"
summary = "重启 nginx 服务"
simulated_output = ""

[[commands.tokens]]
text = "systemctl"
desc = "管理 systemd 服务和单元的命令"

[[commands.tokens]]
text = "restart"
desc = "停止后重新启动指定服务"

[[commands.tokens]]
text = "nginx"
desc = "要重启的服务名称"

[commands.dictation]
